<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inkwell — Personal Journal</title>

<!-- React + Babel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
/* =============================================
   INKWELL — PERSONAL JOURNAL
   Aesthetic: Editorial warmth meets refined ink
   Fonts: Playfair Display + DM Sans
============================================= */

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --ink: #1a1510;
  --ink-2: #3d3530;
  --ink-3: #6b6058;
  --ink-4: #9e948a;
  --paper: #faf8f4;
  --paper-2: #f3efe8;
  --paper-3: #ece6dc;
  --paper-4: #e0d9cd;
  --accent: #c0622a;
  --accent-2: #e07840;
  --accent-soft: rgba(192, 98, 42, 0.12);
  --green: #3a7d5c;
  --blue: #2d5fa8;
  --red: #c0352a;
  --shadow-sm: 0 1px 3px rgba(26,21,16,0.08), 0 1px 2px rgba(26,21,16,0.06);
  --shadow-md: 0 4px 12px rgba(26,21,16,0.1), 0 2px 6px rgba(26,21,16,0.08);
  --shadow-lg: 0 12px 40px rgba(26,21,16,0.12), 0 4px 16px rgba(26,21,16,0.08);
  --radius: 10px;
  --radius-sm: 6px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
}

[data-theme="dark"] {
  --ink: #f0ece4;
  --ink-2: #d4cec6;
  --ink-3: #a09890;
  --ink-4: #6e6860;
  --paper: #1c1a17;
  --paper-2: #242220;
  --paper-3: #2e2c28;
  --paper-4: #3a3830;
  --accent: #e07840;
  --accent-2: #f0924a;
  --accent-soft: rgba(224, 120, 64, 0.15);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.35), 0 2px 6px rgba(0,0,0,0.2);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.25);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
  -webkit-font-smoothing: antialiased;
}

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--paper-2); }
::-webkit-scrollbar-thumb { background: var(--paper-4); border-radius: 3px; }

/* ===================== AUTH PAGE ===================== */
.auth-page {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
}

@media (max-width: 768px) {
  .auth-page { grid-template-columns: 1fr; }
  .auth-brand { display: none; }
}

.auth-brand {
  background: var(--ink);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 60px;
  position: relative;
  overflow: hidden;
}

.auth-brand::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 30% 70%, rgba(192,98,42,0.2) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(224,120,64,0.1) 0%, transparent 50%);
}

.brand-logo {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 700;
  color: var(--paper);
  letter-spacing: -1px;
  position: relative;
  z-index: 1;
}

.brand-logo span { color: var(--accent-2); }

.brand-tagline {
  font-size: 15px;
  color: rgba(240,236,228,0.5);
  margin-top: 12px;
  font-weight: 300;
  letter-spacing: 0.5px;
  position: relative;
  z-index: 1;
}

.brand-lines {
  position: absolute;
  inset: 0;
  overflow: hidden;
  z-index: 0;
}

.brand-lines::before, .brand-lines::after {
  content: '';
  position: absolute;
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 50%;
}

.brand-lines::before { width: 400px; height: 400px; top: -100px; right: -100px; }
.brand-lines::after { width: 250px; height: 250px; bottom: 80px; left: -50px; }

.auth-panel {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  background: var(--paper);
}

.auth-box {
  width: 100%;
  max-width: 400px;
}

.auth-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 32px;
  border-bottom: 2px solid var(--paper-3);
}

.auth-tab {
  flex: 1;
  padding: 12px;
  background: none;
  border: none;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-4);
  cursor: pointer;
  position: relative;
  transition: color var(--transition);
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.auth-tab.active {
  color: var(--accent);
}

.auth-tab.active::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--accent);
}

.auth-title {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 8px;
}

.auth-subtitle {
  font-size: 14px;
  color: var(--ink-3);
  margin-bottom: 28px;
}

/* ---- Form elements ---- */
.field {
  margin-bottom: 16px;
}

.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--ink-3);
  margin-bottom: 6px;
}

.field input {
  width: 100%;
  padding: 11px 14px;
  background: var(--paper-2);
  border: 1.5px solid var(--paper-3);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--ink);
  transition: border-color var(--transition), box-shadow var(--transition);
  outline: none;
}

.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
  background: var(--paper);
}

.field input::placeholder { color: var(--ink-4); }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 11px 20px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: white;
  width: 100%;
  padding: 13px;
  font-size: 15px;
  margin-top: 8px;
  letter-spacing: 0.2px;
}

.btn-primary:hover { background: var(--accent-2); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.btn-ghost {
  background: transparent;
  color: var(--ink-2);
  border: 1.5px solid var(--paper-3);
}

.btn-ghost:hover { background: var(--paper-2); border-color: var(--paper-4); }

.btn-icon {
  background: transparent;
  color: var(--ink-3);
  padding: 8px;
  border-radius: var(--radius-sm);
  border: none;
}

.btn-icon:hover { background: var(--paper-2); color: var(--ink); }

.btn-danger {
  background: transparent;
  color: var(--red);
  border: 1.5px solid rgba(192,53,42,0.25);
  font-size: 13px;
}

.btn-danger:hover { background: rgba(192,53,42,0.08); border-color: var(--red); }

.error-msg {
  background: rgba(192,53,42,0.1);
  border: 1px solid rgba(192,53,42,0.3);
  color: var(--red);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  margin-bottom: 16px;
}

.success-msg {
  background: rgba(58,125,92,0.1);
  border: 1px solid rgba(58,125,92,0.3);
  color: var(--green);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  margin-bottom: 16px;
}

/* ===================== APP SHELL ===================== */
.app-shell {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ---- Top Nav ---- */
.top-nav {
  height: 58px;
  background: var(--paper);
  border-bottom: 1px solid var(--paper-3);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-logo {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  text-decoration: none;
  letter-spacing: -0.5px;
  flex-shrink: 0;
}

.nav-logo span { color: var(--accent); }

.nav-spacer { flex: 1; }

.nav-search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--paper-2);
  border: 1.5px solid var(--paper-3);
  border-radius: 20px;
  padding: 7px 14px;
  flex: 1;
  max-width: 320px;
  transition: border-color var(--transition);
}

.nav-search:focus-within {
  border-color: var(--accent);
  background: var(--paper);
}

.nav-search svg { color: var(--ink-4); flex-shrink: 0; }

.nav-search input {
  background: none;
  border: none;
  outline: none;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink);
  width: 100%;
}

.nav-search input::placeholder { color: var(--ink-4); }

.nav-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  font-weight: 700;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity var(--transition);
  text-decoration: none;
}

.nav-avatar:hover { opacity: 0.85; }

/* ===================== DASHBOARD ===================== */
.dashboard {
  flex: 1;
  padding: 32px 24px;
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
}

.dashboard-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 28px;
  gap: 16px;
  flex-wrap: wrap;
}

.dashboard-title {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1;
}

.dashboard-subtitle {
  font-size: 14px;
  color: var(--ink-3);
  margin-top: 4px;
}

.notes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

@media (max-width: 600px) {
  .notes-grid { grid-template-columns: 1fr; }
}

/* ---- Note Card ---- */
.note-card {
  background: var(--paper-2);
  border: 1.5px solid var(--paper-3);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 140px;
}

.note-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

.note-card.pinned {
  border-color: var(--accent);
  background: var(--accent-soft);
}

.note-card-pin {
  position: absolute;
  top: 12px;
  right: 12px;
  color: var(--accent);
  font-size: 12px;
}

.note-card-title {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
  padding-right: 20px;
}

.note-card-preview {
  font-size: 13px;
  color: var(--ink-3);
  line-height: 1.5;
  flex: 1;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}

.note-card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
}

.note-card-date {
  font-size: 11px;
  color: var(--ink-4);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.note-card-blocks {
  display: flex;
  gap: 4px;
  align-items: center;
}

.block-badge {
  width: 20px;
  height: 20px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
}

.block-badge.img { background: rgba(45,95,168,0.15); color: var(--blue); }
.block-badge.audio { background: rgba(58,125,92,0.15); color: var(--green); }
.block-badge.draw { background: rgba(192,98,42,0.15); color: var(--accent); }

.note-card-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity var(--transition);
  position: absolute;
  bottom: 12px;
  right: 12px;
}

.note-card:hover .note-card-actions { opacity: 1; }

.card-action-btn {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: none;
  background: var(--paper-3);
  color: var(--ink-3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  transition: all var(--transition);
}

.card-action-btn:hover { background: var(--paper-4); color: var(--ink); }
.card-action-btn.del:hover { background: rgba(192,53,42,0.15); color: var(--red); }
.card-action-btn.pin:hover { background: var(--accent-soft); color: var(--accent); }

.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
}

.empty-state-icon {
  font-size: 56px;
  margin-bottom: 16px;
  opacity: 0.3;
}

.empty-state h3 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 8px;
}

.empty-state p { font-size: 14px; color: var(--ink-3); }

/* ===================== NOTE EDITOR ===================== */
.editor-page {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 760px;
  margin: 0 auto;
  width: 100%;
  padding: 0 24px 60px;
}

.editor-topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 0;
  border-bottom: 1px solid var(--paper-3);
  margin-bottom: 24px;
  position: sticky;
  top: 58px;
  background: var(--paper);
  z-index: 90;
}

.editor-topbar-spacer { flex: 1; }

.editor-save-status {
  font-size: 12px;
  color: var(--ink-4);
  display: flex;
  align-items: center;
  gap: 5px;
}

.editor-save-status.saving { color: var(--accent); }
.editor-save-status.saved { color: var(--green); }

.editor-title {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 700;
  color: var(--ink);
  border: none;
  background: none;
  outline: none;
  width: 100%;
  line-height: 1.2;
  resize: none;
  font-style: italic;
  margin-bottom: 4px;
}

.editor-title::placeholder { color: var(--paper-4); }

.editor-date {
  font-size: 12px;
  color: var(--ink-4);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 24px;
}

/* ---- Blocks ---- */
.blocks-container {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.block-wrapper {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  position: relative;
  border-radius: var(--radius-sm);
  transition: background var(--transition);
}

.block-wrapper:hover { background: var(--paper-2); }

.block-wrapper:hover .block-drag-handle { opacity: 1; }

.block-drag-handle {
  width: 20px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px 0;
  cursor: grab;
  color: var(--ink-4);
  opacity: 0;
  font-size: 12px;
  transition: opacity var(--transition);
}

.block-content-area { flex: 1; min-width: 0; }

.block-wrapper:hover .block-side-actions { opacity: 1; }

.block-side-actions {
  display: flex;
  align-items: center;
  gap: 2px;
  opacity: 0;
  transition: opacity var(--transition);
  padding: 6px 0;
  flex-shrink: 0;
}

.block-side-btn {
  width: 26px;
  height: 26px;
  border-radius: 5px;
  border: none;
  background: transparent;
  color: var(--ink-4);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  transition: all var(--transition);
}

.block-side-btn:hover { background: var(--paper-3); color: var(--ink); }
.block-side-btn.del-block:hover { background: rgba(192,53,42,0.1); color: var(--red); }

/* Text Block */
.text-block textarea {
  width: 100%;
  background: none;
  border: none;
  outline: none;
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink);
  resize: none;
  padding: 8px 0;
  min-height: 42px;
}

.text-block textarea::placeholder { color: var(--ink-4); }

/* Image Block */
.image-block {
  padding: 8px 0;
}

.image-block img {
  max-width: 100%;
  border-radius: var(--radius-sm);
  display: block;
}

.image-block-caption {
  font-size: 12px;
  color: var(--ink-4);
  margin-top: 6px;
  font-style: italic;
  background: none;
  border: none;
  outline: none;
  width: 100%;
  font-family: var(--font-body);
}

/* Audio Block */
.audio-block {
  padding: 10px 0;
}

.audio-player {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--paper-3);
  border-radius: var(--radius);
  padding: 12px 16px;
}

.audio-play-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 13px;
  transition: all var(--transition);
}

.audio-play-btn:hover { background: var(--accent-2); transform: scale(1.05); }

.audio-waveform {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 2px;
  height: 32px;
}

.waveform-bar {
  flex: 1;
  background: var(--paper-4);
  border-radius: 2px;
  transition: background var(--transition);
}

.waveform-bar.active { background: var(--accent); }

.audio-duration {
  font-size: 12px;
  color: var(--ink-3);
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

/* Drawing Block */
.drawing-block {
  padding: 8px 0;
}

.drawing-block img {
  max-width: 100%;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--paper-3);
  display: block;
}

/* ---- Insert Block Toolbar ---- */
.insert-toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 12px 0 4px;
  position: sticky;
  bottom: 0;
  background: var(--paper);
  border-top: 1px solid var(--paper-3);
  margin-top: 16px;
}

.insert-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--ink-4);
  margin-right: 4px;
  font-weight: 600;
}

.insert-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  background: var(--paper-2);
  border: 1.5px solid var(--paper-3);
  border-radius: 20px;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-3);
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.insert-btn:hover { background: var(--paper-3); color: var(--ink); border-color: var(--paper-4); }
.insert-btn.text:hover { border-color: var(--ink-3); }
.insert-btn.image:hover { border-color: var(--blue); color: var(--blue); }
.insert-btn.audio:hover { border-color: var(--green); color: var(--green); }
.insert-btn.drawing:hover { border-color: var(--accent); color: var(--accent); }

/* ===================== RECORDING UI ===================== */
.recording-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(192,53,42,0.1);
  border: 1.5px solid rgba(192,53,42,0.3);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin: 8px 0;
}

.rec-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--red);
  animation: pulse-rec 1s infinite;
  flex-shrink: 0;
}

@keyframes pulse-rec {
  0%, 100% { opacity: 1; }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

// ============================================================
//  LOCAL STORAGE KEY
// ============================================================
const LS_KEY = 'inkwell-demo';

// ============================================================
//  LOCAL STORE — helpers to read/write the single localStorage key
// ============================================================
function lsRead() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return { user: null, notes: [], nextId: 1 };
    return JSON.parse(raw);
  } catch { return { user: null, notes: [], nextId: 1 }; }
}

function lsWrite(data) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch (e) {
    console.error('localStorage write failed:', e);
  }
}

// ============================================================
//  CONTEXTS
// ============================================================
const AppContext = createContext(null);
const ToastContext = createContext(null);

// ============================================================
//  ICONS (inline SVGs)
// ============================================================
const Icon = ({ name, size = 16, ...props }) => {
  const icons = {
    search: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M12 5v14M5 12h14"/></svg>,
    trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>,
    pin: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
    back: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M19 12H5M12 5l-7 7 7 7"/></svg>,
    text: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>,
    image: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
    mic: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>,
    pencil: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>,
    play: <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" {...props}><polygon points="5 3 19 12 5 21 5 3"/></svg>,
    pause: <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" {...props}><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
    eraser: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21M22 21H7M5 11l8 8"/></svg>,
    clear: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M3 6h18M8 6V4h8v2M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>,
    sun: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
    moon: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
    user: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="20 6 9 17 4 12"/></svg>,
    dots: <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" {...props}><circle cx="12" cy="12" r="1.5"/><circle cx="6" cy="12" r="1.5"/><circle cx="18" cy="12" r="1.5"/></svg>,
    download: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
    eye: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
  };
  return icons[name] || null;
};

// ============================================================
//  TOAST PROVIDER
// ============================================================
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);

  const addToast = useCallback((msg, type = 'default') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
  }, []);

  return (
    <ToastContext.Provider value={addToast}>
      {children}
      <div className="toast-container">
        {toasts.map(t => (
          <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}

const useToast = () => useContext(ToastContext);

// ============================================================
//  UTILITIES
// ============================================================
function genId() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

function formatDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function getPreview(blocks) {
  for (const b of blocks) {
    if (b.type === 'text' && b.content?.trim()) return b.content.trim().slice(0, 120);
  }
  return '';
}

function getInitials(name) {
  if (!name) return '?';
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

// ============================================================
//  DATA SERVICE — localStorage only
// ============================================================
const DataService = {
  // ---- Notes ----
  async createNote(_userId, note) {
    const store = lsRead();
    const id = 'note_' + store.nextId++;
    const now = new Date().toISOString();
    const full = { ...note, id, createdAt: now, updatedAt: now };
    store.notes.unshift(full);
    lsWrite(store);
    return full;
  },

  async updateNote(_userId, noteId, data) {
    const store = lsRead();
    const idx = store.notes.findIndex(n => n.id === noteId);
    if (idx >= 0) {
      store.notes[idx] = { ...store.notes[idx], ...data, updatedAt: new Date().toISOString() };
      lsWrite(store);
    }
  },

  async deleteNote(_userId, noteId) {
    const store = lsRead();
    store.notes = store.notes.filter(n => n.id !== noteId);
    lsWrite(store);
  },

  subscribeNotes(_userId, callback) {
    // Initial load
    callback([...lsRead().notes]);
    // Poll for cross-tab changes
    const handler = (e) => {
      if (e.key === LS_KEY) callback([...lsRead().notes]);
    };
    window.addEventListener('storage', handler);
    return () => window.removeEventListener('storage', handler);
  },

  // ---- File handling — all base64 in localStorage ----
  async uploadFile(_userId, file, _path) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.onerror = () => reject(new Error('File read failed'));
      reader.readAsDataURL(file);
    });
  },

  async uploadBase64(_userId, dataUrl, _filename) {
    // Drawings are already base64 data URLs — return as-is
    return dataUrl;
  },

  // ---- Auth ----
  async signIn(email, password) {
    if (!email || !password) throw new Error('Please enter email and password.');
    const store = lsRead();
    // If an account with this email exists, check password
    if (store.user && store.user.email === email) {
      if (store.user._password && store.user._password !== password) {
        throw new Error('Incorrect password.');
      }
      return store.user;
    }
    // Otherwise treat as a guest sign-in (any credentials work)
    const user = {
      uid: 'user_' + Date.now(),
      email,
      displayName: email.split('@')[0],
      _password: password,
    };
    store.user = user;
    lsWrite(store);
    return user;
  },

  async register(email, password, name) {
    if (!email || !password || !name) throw new Error('Please fill in all fields.');
    const store = lsRead();
    const user = {
      uid: 'user_' + Date.now(),
      email,
      displayName: name,
      _password: password,
    };
    store.user = user;
    lsWrite(store);
    return user;
  },

  async signOut() {
    const store = lsRead();
    store.user = null;
    lsWrite(store);
  },

  onAuthChange(callback) {
    // Check localStorage immediately (persists across refresh)
    const store = lsRead();
    callback(store.user || null);
    return () => {};
  },
};

// ============================================================
//  AUTH PAGE
// ============================================================
function AuthPage() {
  const [tab, setTab] = useState('login');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const toast = useToast();
  const { setUser } = useContext(AppContext);

  // Login state
  const [loginEmail, setLoginEmail] = useState('');
  const [loginPass, setLoginPass] = useState('');

  // Register state
  const [regName, setRegName] = useState('');
  const [regEmail, setRegEmail] = useState('');
  const [regPass, setRegPass] = useState('');
  const [regConfirm, setRegConfirm] = useState('');

  async function handleLogin(e) {
    e.preventDefault();
    setError('');
    if (!loginEmail || !loginPass) { setError('Please fill in all fields.'); return; }
    setLoading(true);
    try {
      const user = await DataService.signIn(loginEmail, loginPass);
      setUser(user);
      toast('Welcome back!', 'success');
    } catch (e) {
      setError(e.message || 'Login failed.');
    } finally { setLoading(false); }
  }

  async function handleRegister(e) {
    e.preventDefault();
    setError('');
    if (!regName || !regEmail || !regPass || !regConfirm) { setError('Please fill in all fields.'); return; }
    if (regPass !== regConfirm) { setError('Passwords do not match.'); return; }
    if (regPass.length < 6) { setError('Password must be at least 6 characters.'); return; }
    setLoading(true);
    try {
      const user = await DataService.register(regEmail, regPass, regName);
      setUser(user);
      toast('Account created!', 'success');
    } catch (e) {
      setError(e.message || 'Registration failed.');
    } finally { setLoading(false); }
  }

  return (
    <div className="auth-page">
      <div className="auth-brand">
        <div className="brand-lines" />
        <div className="brand-logo">Ink<span>well</span></div>
        <div className="brand-tagline">Your thoughts, beautifully kept</div>
      </div>
      <div className="auth-panel">
        <div className="auth-box">
          <div className="auth-tabs">
            <button className={`auth-tab ${tab === 'login' ? 'active' : ''}`} onClick={() => { setTab('login'); setError(''); }}>Sign In</button>
            <button className={`auth-tab ${tab === 'register' ? 'active' : ''}`} onClick={() => { setTab('register'); setError(''); }}>Register</button>
          </div>

          {tab === 'login' ? (
            <div>
              <div className="auth-title">Welcome back</div>
              <div className="auth-subtitle">Sign in to continue to your journal</div>
              {error && <div className="error-msg">{error}</div>}
              <form onSubmit={handleLogin}>
                <div className="field"><label>Email</label><input type="email" placeholder="you@example.com" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} autoComplete="email" /></div>
                <div className="field"><label>Password</label><input type="password" placeholder="Your password" value={loginPass} onChange={e => setLoginPass(e.target.value)} autoComplete="current-password" /></div>
                <button type="submit" className="btn btn-primary" disabled={loading}>{loading ? 'Signing in…' : 'Sign In'}</button>
              </form>
            </div>
          ) : (
            <div>
              <div className="auth-title">Create account</div>
              <div className="auth-subtitle">Start your journaling journey today</div>
              {error && <div className="error-msg">{error}</div>}
              <form onSubmit={handleRegister}>
                <div className="field"><label>Full Name</label><input type="text" placeholder="Jane Doe" value={regName} onChange={e => setRegName(e.target.value)} autoComplete="name" /></div>
                <div className="field"><label>Email</label><input type="email" placeholder="you@example.com" value={regEmail} onChange={e => setRegEmail(e.target.value)} autoComplete="email" /></div>
                <div className="field"><label>Password</label><input type="password" placeholder="At least 6 characters" value={regPass} onChange={e => setRegPass(e.target.value)} autoComplete="new-password" /></div>
                <div className="field"><label>Confirm Password</label><input type="password" placeholder="Repeat password" value={regConfirm} onChange={e => setRegConfirm(e.target.value)} autoComplete="new-password" /></div>
                <button type="submit" className="btn btn-primary" disabled={loading}>{loading ? 'Creating…' : 'Create Account'}</button>
              </form>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ============================================================
//  DRAWING CANVAS MODAL
// ============================================================
function DrawingModal({ onSave, onClose }) {
  const canvasRef = useRef(null);
  const [drawing, setDrawing] = useState(false);
  const [color, setColor] = useState('#1a1510');
  const [size, setSize] = useState(3);
  const [mode, setMode] = useState('pen'); // pen | eraser
  const lastPos = useRef(null);

  const COLORS = ['#1a1510','#c0622a','#2d5fa8','#3a7d5c','#c0352a','#9b59b6','#f39c12','#ffffff'];
  const SIZES = [{ label: 'S', val: 2 }, { label: 'M', val: 5 }, { label: 'L', val: 12 }];

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    canvas.height = 340;
    ctx.fillStyle = '#faf8f4';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }, []);

  function getPos(e, canvas) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    if (e.touches) {
      return {
        x: (e.touches[0].clientX - rect.left) * scaleX,
        y: (e.touches[0].clientY - rect.top) * scaleY
      };
    }
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  }

  function startDraw(e) {
    e.preventDefault();
    setDrawing(true);
    lastPos.current = getPos(e, canvasRef.current);
  }

  function draw(e) {
    e.preventDefault();
    if (!drawing) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const pos = getPos(e, canvas);

    ctx.beginPath();
    ctx.moveTo(lastPos.current.x, lastPos.current.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = mode === 'eraser' ? '#faf8f4' : color;
    ctx.lineWidth = mode === 'eraser' ? size * 5 : size;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
    lastPos.current = pos;
  }

  function endDraw() { setDrawing(false); lastPos.current = null; }

  function clearCanvas() {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#faf8f4';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function saveDrawing() {
    const dataUrl = canvasRef.current.toDataURL('image/png');
    onSave(dataUrl);
  }

  return (
    <div className="drawing-modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="drawing-modal">
        <div className="drawing-modal-header">
          <div className="drawing-modal-title">✏️ Drawing Canvas</div>
          <button className="btn-icon" onClick={onClose}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
        </div>

        <div className="canvas-toolbar">
          <div className="canvas-colors">
            {COLORS.map(c => (
              <div key={c} className={`color-swatch ${color === c && mode === 'pen' ? 'active' : ''}`}
                style={{ background: c, boxShadow: c === '#ffffff' ? 'inset 0 0 0 1px #ddd' : 'none' }}
                onClick={() => { setColor(c); setMode('pen'); }} />
            ))}
          </div>
          <div className="canvas-sizes">
            {SIZES.map(s => (
              <button key={s.val} className={`size-btn ${size === s.val && mode === 'pen' ? 'active' : ''}`}
                onClick={() => { setSize(s.val); setMode('pen'); }}>{s.label}</button>
            ))}
          </div>
          <div className="canvas-actions">
            <button className={`size-btn ${mode === 'eraser' ? 'active' : ''}`} onClick={() => setMode('eraser')}>Eraser</button>
            <button className="size-btn" onClick={clearCanvas}>Clear</button>
          </div>
        </div>

        <canvas ref={canvasRef} id="drawing-canvas"
          onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
          onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw}
          style={{ display: 'block', width: '100%', height: '340px', cursor: mode === 'eraser' ? 'cell' : 'crosshair' }}
        />

        <div className="drawing-modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" style={{ width: 'auto', padding: '10px 22px' }} onClick={saveDrawing}>Insert Drawing</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
//  AUDIO RECORDER
// ============================================================
function AudioRecorder({ onSave, onClose }) {
  const [recording, setRecording] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const mediaRef = useRef(null);
  const chunksRef = useRef([]);
  const timerRef = useRef(null);
  const streamRef = useRef(null);

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      streamRef.current = stream;
      const mr = new MediaRecorder(stream);
      mediaRef.current = mr;
      chunksRef.current = [];
      mr.ondataavailable = e => chunksRef.current.push(e.data);
      mr.onstop = () => {
        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
        onSave(blob, elapsed);
        stream.getTracks().forEach(t => t.stop());
      };
      mr.start();
      setRecording(true);
      timerRef.current = setInterval(() => setElapsed(e => e + 1), 1000);
    } catch (e) {
      alert('Microphone access denied. Please allow microphone access to record audio.');
    }
  }

  function stopRecording() {
    clearInterval(timerRef.current);
    if (mediaRef.current && mediaRef.current.state !== 'inactive') {
      mediaRef.current.stop();
    }
    setRecording(false);
  }

  useEffect(() => {
    startRecording();
    return () => {
      clearInterval(timerRef.current);
      if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    };
  }, []);

  return (
    <div className="recording-indicator">
      <div className="rec-dot" />
      <span className="rec-text">Recording audio…</span>
      <span className="rec-time">{formatTime(elapsed)}</span>
      <button className="rec-stop-btn" onClick={stopRecording}>Stop & Insert</button>
      <button className="btn-icon" style={{ marginLeft: 4 }} onClick={() => { stopRecording(); onClose(); }}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
  );
}

        onChange={e => { onChange({ ...block, content: e.target.value }); }} rows={1}

function ImageBlockComp({ block }) {
  return (
    <div className="image-block">
      <img src={block.url} alt={block.caption || 'Inserted image'} />
      {block.caption && <div className="image-block-caption">{block.caption}</div>}

function AudioBlockComp({ block }) {
  const [playing, setPlaying] = useState(false);
  const [currentTime, setCurrentTime] = useState(0);
  const audioRef = useRef(null);

  useEffect(() => {
    const audio = new Audio(block.url);
    audioRef.current = audio;
    audio.ontimeupdate = () => setCurrentTime(audio.currentTime);
    audio.onended = () => setPlaying(false);
    return () => { audio.pause(); audio.src = ''; };
  }, [block.url]);

  function togglePlay() {
    if (playing) { audioRef.current.pause(); setPlaying(false); }
    else { audioRef.current.play(); setPlaying(true); }
  }

  const duration = block.duration || 0;
  const progress = duration > 0 ? currentTime / duration : 0;
  const bars = 24;

  return (
    <div className="audio-block">
      <div className="audio-player">
        <button className="audio-play-btn" onClick={togglePlay}>
          <Icon name={playing ? 'pause' : 'play'} size={14} />
        </button>
        <div className="audio-waveform">
          {Array.from({ length: bars }).map((_, i) => {
            const h = 30 + Math.sin(i * 0.8) * 20 + Math.random() * 15;
            return (
              <div key={i} className={`waveform-bar ${i / bars <= progress ? 'active' : ''}`}
                style={{ height: `${h}%` }} />
            );
          })}
        </div>
        <div className="audio-duration">{formatTime(currentTime)} / {formatTime(duration)}</div>
      </div>
    </div>
  );
}

function DrawingBlockComp({ block }) {
  return (
    <div className="drawing-block">
      <img src={block.data} alt="Drawing" />
    </div>
  );
}

// ============================================================
//  NOTE EDITOR
// ============================================================
function NoteEditor({ noteId, onBack }) {
  const { user } = useContext(AppContext);
  const toast = useToast();
  const [note, setNote] = useState(null);
  const [title, setTitle] = useState('');
  const [blocks, setBlocks] = useState([]);
  const [saving, setSaving] = useState(false);
  const [saveStatus, setSaveStatus] = useState(''); // '' | 'saving' | 'saved'
  const [showDrawing, setShowDrawing] = useState(false);
  const [recordingIdx, setRecordingIdx] = useState(null);
  const saveTimer = useRef(null);
  const imageInputRef = useRef(null);
  const isNew = !noteId;

  // Load note
  useEffect(() => {
    if (!noteId) {
      const defaultBlock = { id: genId(), type: 'text', content: '' };
      setBlocks([defaultBlock]);
      return;
    }
    const n = lsRead().notes.find(x => x.id === noteId);
    if (n) { setNote(n); setTitle(n.title || ''); setBlocks(n.blocks || []); }
  }, [noteId]);

  // Auto-save
  const scheduleSave = useCallback(() => {
    clearTimeout(saveTimer.current);
    setSaveStatus('saving');
    saveTimer.current = setTimeout(() => saveNote(), 1500);
  }, [title, blocks]);

  async function saveNote() {
    setSaving(true);
    try {
      const data = { title, blocks };
      if (isNew && !note) {
        const saved = await DataService.createNote(user.uid, data);
        setNote(saved);
      } else {
        await DataService.updateNote(user.uid, note?.id || noteId, data);
      }
      setSaveStatus('saved');
      setTimeout(() => setSaveStatus(''), 2000);
    } catch (e) {
      toast('Save failed', 'error');
    } finally { setSaving(false); }
  }

  useEffect(() => {
    if (note !== null || isNew) scheduleSave();
  }, [title, blocks]);

  // Block helpers
  function updateBlock(id, data) {
    setBlocks(bs => bs.map(b => b.id === id ? { ...b, ...data } : b));
  }

  function deleteBlock(id) {
    setBlocks(bs => bs.filter(b => b.id !== id));
  }

  function addTextBlock() {
    setBlocks(bs => [...bs, { id: genId(), type: 'text', content: '' }]);
  }

  async function handleImageInsert(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const url = await DataService.uploadFile(user.uid, file, 'images');
      setBlocks(bs => [...bs, { id: genId(), type: 'image', url, caption: '' }]);
    } catch (err) { toast('Image upload failed', 'error'); }
    e.target.value = '';
  }

  async function handleAudioSave(blob, duration) {
    try {
      const url = await DataService.uploadFile(user.uid, blob, 'audio');
      setBlocks(bs => [...bs, { id: genId(), type: 'audio', url, duration }]);
    } catch (err) { toast('Audio save failed', 'error'); }
    setRecordingIdx(null);
  }

  async function handleDrawingSave(dataUrl) {
    try {
      const url = await DataService.uploadBase64(user.uid, dataUrl, 'drawing');
      setBlocks(bs => [...bs, { id: genId(), type: 'drawing', data: url }]);
    } catch (err) { toast('Drawing save failed', 'error'); }
    setShowDrawing(false);
  }

  function moveBlock(idx, dir) {
    setBlocks(bs => {
      const arr = [...bs];
      const target = idx + dir;
      if (target < 0 || target >= arr.length) return arr;
      [arr[idx], arr[target]] = [arr[target], arr[idx]];
      return arr;
    });
  }

  const createdAt = note?.createdAt ? formatDate(note.createdAt) : 'New note';

  return (
    <div className="app-shell">
      <nav className="top-nav">
        <button className="btn btn-ghost" style={{ gap: 6, padding: '7px 12px', fontSize: 13 }} onClick={onBack}>
          <Icon name="back" size={14} /> Notes
        </button>
        <div className="nav-spacer" />
        <div className={`editor-save-status ${saveStatus}`}>
          {saveStatus === 'saving' && <><div className="loading-spinner" style={{ width: 12, height: 12, borderWidth: 2 }} /> Saving…</>}
          {saveStatus === 'saved' && <><Icon name="check" size={12} /> Saved</>}
        </div>
        <button className="btn btn-primary" style={{ width: 'auto', padding: '8px 18px', fontSize: 13 }} onClick={saveNote} disabled={saving}>
          {saving ? 'Saving…' : 'Save'}
        </button>
      </nav>

      <div className="editor-page">
        <textarea className="editor-title" placeholder="Untitled" value={title}
          onChange={e => setTitle(e.target.value)} rows={1}
          style={{ overflow: 'hidden', minHeight: 50 }}
          onInput={e => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }}
        />
        <div className="editor-date">{createdAt}</div>

        <div className="blocks-container">
          {blocks.map((block, idx) => (
            <div key={block.id} className="block-wrapper">
              <div className="block-drag-handle">
                <Icon name="dots" size={14} />
              </div>
              <div className="block-content-area">
                {block.type === 'text' && <TextBlockComp block={block} onChange={b => updateBlock(block.id, b)} />}
                {block.type === 'image' && <ImageBlockComp block={block} />}
                {block.type === 'audio' && <AudioBlockComp block={block} />}
                {block.type === 'drawing' && <DrawingBlockComp block={block} />}
              </div>
              <div className="block-side-actions">
                {idx > 0 && <button className="block-side-btn" title="Move up" onClick={() => moveBlock(idx, -1)}>↑</button>}
                {idx < blocks.length - 1 && <button className="block-side-btn" title="Move down" onClick={() => moveBlock(idx, 1)}>↓</button>}
                <button className="block-side-btn del-block" title="Delete block" onClick={() => deleteBlock(block.id)}>
                  <Icon name="trash" size={11} />
                </button>
              </div>
            </div>
          ))}
        </div>

        {recordingIdx !== null && (
          <AudioRecorder onSave={handleAudioSave} onClose={() => setRecordingIdx(null)} />
        )}

        <div className="insert-toolbar">
          <span className="insert-label">Insert</span>
          <button className="insert-btn text" onClick={addTextBlock}>
            <Icon name="text" size={13} /> Text
          </button>
          <button className="insert-btn image" onClick={() => imageInputRef.current?.click()}>
            <Icon name="image" size={13} /> Image
          </button>
          <button className="insert-btn audio" onClick={() => setRecordingIdx(blocks.length)}
            disabled={recordingIdx !== null}>
            <Icon name="mic" size={13} /> {recordingIdx !== null ? 'Recording…' : 'Audio'}
          </button>
          <button className="insert-btn drawing" onClick={() => setShowDrawing(true)}>
            <Icon name="pencil" size={13} /> Drawing
          </button>
        </div>

        <input ref={imageInputRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={handleImageInsert} />
      </div>

      {showDrawing && <DrawingModal onSave={handleDrawingSave} onClose={() => setShowDrawing(false)} />}
    </div>
  );
}

//  DASHBOARD
// ============================================================
function Dashboard({ onNewNote, onOpenNote }) {
  const { user } = useContext(AppContext);
  const toast = useToast();
  const [notes, setNotes] = useState([]);
  const [search, setSearch] = useState('');
  const [deleteTarget, setDeleteTarget] = useState(null);

  function refreshNotes() {
    setNotes([...lsRead().notes]);
  }

  useEffect(() => {
    refreshNotes();
    const handler = (e) => { if (e.key === LS_KEY) refreshNotes(); };
    window.addEventListener('storage', handler);
    return () => window.removeEventListener('storage', handler);
  }, []);

  async function handleDelete(noteId) {
    try {
      await DataService.deleteNote(user.uid, noteId);
      refreshNotes();
      toast('Note deleted');
    } catch { toast('Delete failed', 'error'); }
    setDeleteTarget(null);
  }

  async function togglePin(e, note) {
    e.stopPropagation();
    try {
      await DataService.updateNote(user.uid, note.id, { pinned: !note.pinned });
      refreshNotes();
    } catch { toast('Failed to pin', 'error'); }
  }

  const filtered = notes.filter(n => {
    if (!search) return true;
    const q = search.toLowerCase();
    return n.title?.toLowerCase().includes(q) || getPreview(n.blocks || []).toLowerCase().includes(q);
  });

  const sorted = [...filtered].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));

  const greeting = () => {
    const h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 18) return 'Good afternoon';
    return 'Good evening';
  };

  return (
    <div className="app-shell">
      <nav className="top-nav">
        <a className="nav-logo" href="#">Ink<span>well</span></a>
        <div className="nav-search">
          <Icon name="search" size={14} />
          <input placeholder="Search notes…" value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <div className="nav-spacer" />
        <button className="btn btn-primary" style={{ width: 'auto', padding: '8px 16px', gap: 6, fontSize: 13 }} onClick={onNewNote}>
          <Icon name="plus" size={14} /> New Note
        </button>
        <a href="#profile" className="nav-avatar" onClick={e => { e.preventDefault(); window._navigateTo('profile'); }}>
          {getInitials(user.displayName || user.email)}
        </a>
      </nav>

      <div className="dashboard">
        <div className="dashboard-header">
          <div>
            <div className="dashboard-title">{greeting()}{user.displayName ? `, ${user.displayName.split(' ')[0]}` : ''} 👋</div>
            <div className="dashboard-subtitle">{notes.length} note{notes.length !== 1 ? 's' : ''} in your journal</div>
          </div>
        </div>

        <div className="notes-grid">
          {sorted.length === 0 ? (
            <div className="empty-state">
              <div className="empty-state-icon">📓</div>
              <h3>{search ? 'No matching notes' : 'Start your first note'}</h3>
              <p>{search ? 'Try a different search term.' : 'Click "New Note" to begin writing your first journal entry.'}</p>
            </div>
          ) : sorted.map(note => {
            const preview = getPreview(note.blocks || []);
            const blockTypes = (note.blocks || []).map(b => b.type).filter(t => t !== 'text');
            const uniqueTypes = [...new Set(blockTypes)];
            return (
              <div key={note.id} className={`note-card ${note.pinned ? 'pinned' : ''}`}
                onClick={() => onOpenNote(note.id)}>
                {note.pinned && <div className="note-card-pin">📌</div>}
                <div className="note-card-title">{note.title || 'Untitled'}</div>
                {preview && <div className="note-card-preview">{preview}</div>}
                <div className="note-card-meta">
                  <div className="note-card-date">{formatDate(note.updatedAt || note.createdAt)}</div>
                  <div className="note-card-blocks">
                    {uniqueTypes.includes('image') && <div className="block-badge img"><Icon name="image" size={10} /></div>}
                    {uniqueTypes.includes('audio') && <div className="block-badge audio"><Icon name="mic" size={10} /></div>}
                    {uniqueTypes.includes('drawing') && <div className="block-badge draw"><Icon name="pencil" size={10} /></div>}
                  </div>
                </div>
                <div className="note-card-actions" onClick={e => e.stopPropagation()}>
                  <button className="card-action-btn pin" title={note.pinned ? 'Unpin' : 'Pin'}
                    onClick={e => togglePin(e, note)}>📌</button>
                  <button className="card-action-btn del" title="Delete"
                    onClick={e => { e.stopPropagation(); setDeleteTarget(note); }}>
                    <Icon name="trash" size={11} />
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {deleteTarget && (
        <ConfirmModal title="Delete note?" message={`"${deleteTarget.title || 'Untitled'}" will be permanently deleted.`}
          onConfirm={() => handleDelete(deleteTarget.id)}
          onClose={() => setDeleteTarget(null)} />
      )}
    </div>
  );
}

function ProfilePage({ onBack }) {
  const { user, theme, setTheme } = useContext(AppContext);
  const toast = useToast();

  async function handleLogout() {
    await DataService.signOut();
    window.location.reload();
  }

  function handleExport() {
    const store = lsRead();
    const notes = store.notes || [];
    if (notes.length === 0) { toast('No notes to export.'); return; }

    // Build CSV rows
    const escapeCSV = (str) => {
      const s = String(str || '').replace(/"/g, '""');
      return `"${s}"`;
    };

    const headers = ['Title', 'Preview Text', 'Created Date', 'Updated Date'];
    const rows = notes.map(n => [
      escapeCSV(n.title || 'Untitled'),
      escapeCSV(getPreview(n.blocks || [])),
      escapeCSV(n.createdAt ? new Date(n.createdAt).toLocaleString('en-US') : ''),
      escapeCSV(n.updatedAt ? new Date(n.updatedAt).toLocaleString('en-US') : ''),
    ]);

    const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\r\n');
    // Add BOM for Excel UTF-8 compatibility
    const bom = '\uFEFF';
    const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'inkwell_notes.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast(`Exported ${notes.length} note${notes.length !== 1 ? 's' : ''}`, 'success');
  }

  return (
    <div className="app-shell">
      <nav className="top-nav">
        <button className="btn btn-ghost" style={{ gap: 6, padding: '7px 12px', fontSize: 13 }} onClick={onBack}>
          <Icon name="back" size={14} /> Notes
        </button>
        <div className="nav-spacer" />
        <span style={{ fontSize: 13, color: 'var(--ink-3)' }}>Profile</span>
      </nav>

      <div className="profile-page">
        <div className="profile-header">
          <div className="profile-avatar-lg">{getInitials(user.displayName || user.email)}</div>
          <div>
            <div className="profile-name">{user.displayName || 'Inkwell User'}</div>
            <div className="profile-email">{user.email}</div>
          </div>
        </div>

        <div className="profile-section">
          <div className="profile-section-title">Account</div>
          <div className="profile-row">
            <div className="profile-row-icon"><Icon name="user" size={14} /></div>
            <div className="profile-row-label">Name</div>
            <div className="profile-row-value">{user.displayName || '—'}</div>
          </div>
          <div className="profile-row">
            <div className="profile-row-icon">@</div>
            <div className="profile-row-label">Email</div>
            <div className="profile-row-value">{user.email}</div>
          </div>
        </div>

        <div className="profile-section">
          <div className="profile-section-title">Preferences</div>
          <div className="profile-row">
            <div className="profile-row-icon">{theme === 'dark' ? <Icon name="moon" size={14} /> : <Icon name="sun" size={14} />}</div>
            <div className="profile-row-label">Dark Mode</div>
            <label className="toggle-switch">
              <input type="checkbox" checked={theme === 'dark'} onChange={() => setTheme(theme === 'dark' ? 'light' : 'dark')} />
              <span className="toggle-slider" />
            </label>
          </div>
        </div>

        <div className="profile-section">
          <div className="profile-section-title">Data</div>
          <div className="profile-row" style={{ cursor: 'pointer' }} onClick={handleExport}>
            <div className="profile-row-icon"><Icon name="download" size={14} /></div>
            <div className="profile-row-label">Export Notes</div>
            <div className="profile-row-value" style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
              <span style={{ fontSize: 12, color: 'var(--ink-4)' }}>CSV</span>
              <Icon name="download" size={13} style={{ color: 'var(--ink-4)' }} />
            </div>
          </div>
        </div>

        <div style={{ marginTop: 8 }}>
          <button className="btn btn-danger" style={{ width: '100%', padding: '13px', fontSize: 14, justifyContent: 'center' }} onClick={handleLogout}>
            Sign Out
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
//  ROOT APP
// ============================================================
function App() {
  const [user, setUser] = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const [theme, setThemeState] = useState(() => localStorage.getItem('inkwell-theme') || 'light');
  const [page, setPage] = useState('dashboard'); // 'dashboard' | 'editor' | 'profile'
  const [editingNoteId, setEditingNoteId] = useState(null);

  // Apply theme
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('inkwell-theme', theme);
  }, [theme]);

  function setTheme(t) { setThemeState(t); }

  // Auth
  useEffect(() => {
    const unsub = DataService.onAuthChange(u => {
      setUser(u);
      setAuthReady(true);
    });
    return () => typeof unsub === 'function' && unsub();
  }, []);

  // Navigation helper
  window._navigateTo = (p, id = null) => {
    setPage(p);
    if (id !== null) setEditingNoteId(id);
  };

  if (!authReady) {
    return (
      <div className="loading-screen">
        <div className="loading-logo">Ink<span>well</span></div>
        <div className="loading-spinner" />
      </div>
    );
  }

  if (!user) {
    return (
      <AppContext.Provider value={{ user: null, setUser, theme, setTheme }}>
        <AuthPage />
      </AppContext.Provider>
    );
  }

  return (
    <AppContext.Provider value={{ user, setUser, theme, setTheme }}>
      {page === 'dashboard' && (
        <Dashboard
          onNewNote={() => { setEditingNoteId(null); setPage('editor'); }}
          onOpenNote={id => { setEditingNoteId(id); setPage('editor'); }}
        />
      )}
      {page === 'editor' && (
        <NoteEditor noteId={editingNoteId} onBack={() => setPage('dashboard')} />
      )}
      {page === 'profile' && (
        <ProfilePage onBack={() => setPage('dashboard')} />
      )}
    </AppContext.Provider>
  );
}

// ============================================================
//  RENDER
// ============================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <ToastProvider>
    <App />
  </ToastProvider>
);
</script>
</body>
</html>
