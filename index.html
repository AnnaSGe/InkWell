    // ═══════════════════════════════════════════════════════════
    //  DRAWING MODAL
    // ═══════════════════════════════════════════════════════════
    function DrawingModal({ onSave, onClose }) {
      const canvasRef = useRef(null);
      const [drawing, setDrawing] = useState(false);
      const [color, setColor] = useState('#1a1510');
      const [size, setSize] = useState(3);
      const [mode, setMode] = useState('pen');
      const [history, setHistory] = useState([]);
      const [future, setFuture] = useState([]);
      const [previewUrl, setPreviewUrl] = useState(null);
      const [showPreview, setShowPreview] = useState(false);
      const [previewSize, setPreviewSize] = useState(null);
      const lastPos = useRef(null);
      const COLORS = ['#1a1510', '#c0622a', '#2d5fa8', '#3a7d5c', '#c0352a', '#9b59b6', '#f39c12', '#ffffff'];
      const SIZES = [{ label: 'XS', val: 1 }, { label: 'S', val: 3 }, { label: 'M', val: 6 }, { label: 'L', val: 14 }];

      useEffect(() => {
        const c = canvasRef.current; if (!c) return;
        const ctx = c.getContext('2d');
        c.width = c.offsetWidth;
        c.height = Math.min(380, window.innerHeight - 280);
        ctx.fillStyle = '#faf8f4'; ctx.fillRect(0, 0, c.width, c.height);
        saveSnapshot();
      }, []);

      function saveSnapshot() {
        const c = canvasRef.current; if (!c) return;
        setHistory(h => [...h.slice(-19), c.toDataURL()]); setFuture([]);
      }
      function undo() {
        setHistory(h => {
          if (h.length < 2) return h;
          const prev = h[h.length - 2]; const cur = h[h.length - 1];
          setFuture(f => [cur, ...f]);
          const img = new Image(); img.onload = () => { const ctx = canvasRef.current?.getContext('2d'); if (ctx && canvasRef.current) { ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height); ctx.drawImage(img, 0, 0); } }; img.src = prev;
          return h.slice(0, -1);
        });
      }
      function redo() {
        setFuture(f => {
          if (!f.length) return f;
          const next = f[0]; setHistory(h => [...h, next]);
          const img = new Image(); img.onload = () => { const ctx = canvasRef.current?.getContext('2d'); if (ctx && canvasRef.current) { ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height); ctx.drawImage(img, 0, 0); } }; img.src = next;
          return f.slice(1);
        });
      }
      function getPos(e, c) {
        const r = c.getBoundingClientRect(), sx = c.width / r.width, sy = c.height / r.height;
        if (e.touches) return { x: (e.touches[0].clientX - r.left) * sx, y: (e.touches[0].clientY - r.top) * sy };
        return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
      }
      function startDraw(e) { e.preventDefault(); setDrawing(true); lastPos.current = getPos(e, canvasRef.current); }
      function draw(e) {
        e.preventDefault(); if (!drawing) return;
        const c = canvasRef.current, ctx = c.getContext('2d'), pos = getPos(e, c);
        ctx.beginPath(); ctx.moveTo(lastPos.current.x, lastPos.current.y); ctx.lineTo(pos.x, pos.y);
        ctx.strokeStyle = mode === 'eraser' ? '#faf8f4' : color;
        ctx.lineWidth = mode === 'eraser' ? size * 5 : size;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
        lastPos.current = pos;
      }
      function endDraw() { if (drawing) { saveSnapshot(); } setDrawing(false); lastPos.current = null; }
      function clearCanvas() { const c = canvasRef.current, ctx = c.getContext('2d'); ctx.fillStyle = '#faf8f4'; ctx.fillRect(0, 0, c.width, c.height); saveSnapshot(); }
      function handlePreview() { const dataUrl = canvasRef.current.toDataURL('image/png'); const bytes = Math.round(dataUrl.length * 0.75); setPreviewUrl(dataUrl); setPreviewSize(bytes); setShowPreview(true); }
      function handleSave() { onSave(canvasRef.current.toDataURL('image/png')); }

      return (
        <div className="drawing-modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="drawing-modal">
            <div className="drawing-modal-header"><div className="drawing-modal-title">✏️ Drawing</div><button className="btn-icon" style={{ minWidth: 36, minHeight: 36 }} onClick={onClose}><I n="close" s={15} /></button></div>
            <div className="canvas-toolbar">
              <div className="canvas-colors">{COLORS.map(c => (<div key={c} className={`color-swatch ${color === c && mode === 'pen' ? 'active' : ''}`} style={{ background: c, boxShadow: c === '#ffffff' ? 'inset 0 0 0 1px #ccc' : 'none' }} onClick={() => { setColor(c); setMode('pen'); }} />))}</div>
              <div className="canvas-sep" />
              <div className="canvas-sizes">{SIZES.map(s => (<button key={s.val} className={`size-btn ${size === s.val && mode === 'pen' ? 'active' : ''}`} onClick={() => { setSize(s.val); setMode('pen'); }}>{s.label}</button>))}</div>
              <div className="canvas-sep" />
              <div className="canvas-tools">
                <button className={`tool-btn ${mode === 'eraser' ? 'active' : ''}`} onClick={() => setMode('eraser')}>Eraser</button>
                <button className="tool-btn" onClick={undo} disabled={history.length < 2} title="Undo"><I n="undo" s={13} /></button>
                <button className="tool-btn" onClick={redo} disabled={!future.length} title="Redo"><I n="redo" s={13} /></button>
                <button className="tool-btn" onClick={clearCanvas}>Clear</button>
              </div>
            </div>
            <div className="canvas-wrap">
              <canvas ref={canvasRef} id="drawing-canvas" onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw} onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw} style={{ cursor: mode === 'eraser' ? 'cell' : 'crosshair' }} />
            </div>
            {showPreview && previewUrl && (
              <div className="drawing-preview-pane">
                <img className="drawing-preview-thumb" src={previewUrl} alt="Preview" />
                <div className="drawing-preview-info"><div className="drawing-preview-label">Preview</div><div className="drawing-preview-size">~{fmtBytes(previewSize)}{previewSize > MAX_FILE_BYTES ? ' — ⚠️ too large' : ''}</div></div>
                <button className="tool-btn" style={{ marginLeft: 'auto' }} onClick={() => setShowPreview(false)}>Hide</button>
              </div>
            )}
            <div className="drawing-modal-footer">
              <div className="drawing-footer-left">{history.length > 1 ? `${history.length - 1} stroke${history.length - 1 > 1 ? 's' : ''}` : ''}</div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn btn-ghost" style={{ minHeight: 38, padding: '8px 14px', fontSize: 13 }} onClick={handlePreview}><I n="eye" s={13} /> Preview</button>
                <button className="btn btn-ghost" style={{ minHeight: 38, padding: '8px 14px', fontSize: 13 }} onClick={onClose}>Cancel</button>
                <button className="btn btn-primary" style={{ width: 'auto', minHeight: 38, padding: '8px 20px', fontSize: 13, marginTop: 0 }} onClick={handleSave}>Insert</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  AUDIO RECORDER
    // ═══════════════════════════════════════════════════════════
    function AudioRecorder({ onSave, onClose }) {
      const [elapsed, setElapsed] = useState(0);
      const [phase, setPhase] = useState('recording');
      const [pendingBlob, setPendingBlob] = useState(null);
      const [pendingDur, setPendingDur] = useState(0);
      const [bars, setBars] = useState(Array(28).fill(0.15));
      const mediaRef = useRef(null); const chunksRef = useRef([]);
      const timerRef = useRef(null); const streamRef = useRef(null);
      const startRef = useRef(null); const discardRef = useRef(false);
      const analyserRef = useRef(null); const animRef = useRef(null);
      const sourceRef = useRef(null); const ctxRef = useRef(null);

      async function start() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          streamRef.current = stream;
          const mr = new MediaRecorder(stream);
          mediaRef.current = mr; chunksRef.current = []; startRef.current = Date.now();
          mr.ondataavailable = e => chunksRef.current.push(e.data);
          mr.onstop = () => {
            stream.getTracks().forEach(t => t.stop());
            if (discardRef.current) return;
            const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
            const dur = Math.round((Date.now() - startRef.current) / 1000);
            setPendingBlob(blob); setPendingDur(dur); setPhase('confirm');
          };
          mr.start();
          timerRef.current = setInterval(() => setElapsed(e => e + 1), 1000);
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          ctxRef.current = audioCtx;
          const analyser = audioCtx.createAnalyser(); analyser.fftSize = 64;
          analyserRef.current = analyser;
          const source = audioCtx.createMediaStreamSource(stream); sourceRef.current = source;
          source.connect(analyser);
          const data = new Uint8Array(analyser.frequencyBinCount);
          function tick() { analyser.getByteFrequencyData(data); setBars(Array.from({ length: 28 }, (_, i) => Math.max(0.1, (data[i % data.length] || 0) / 255))); animRef.current = requestAnimationFrame(tick); }
          tick();
        } catch (e) { alert('Microphone access denied.'); onClose(); }
      }
      function stop() { clearInterval(timerRef.current); cancelAnimationFrame(animRef.current); if (mediaRef.current?.state !== 'inactive') mediaRef.current?.stop(); ctxRef.current?.close(); }
      function discard() { discardRef.current = true; stop(); onClose(); }
      useEffect(() => { start(); return () => { clearInterval(timerRef.current); cancelAnimationFrame(animRef.current); streamRef.current?.getTracks().forEach(t => t.stop()); ctxRef.current?.close(); }; }, []);

      if (phase === 'confirm') return (
        <div className="confirm-overlay">
          <div className="confirm-modal">
            <h3>Save recording?</h3>
            <p>Your recording is {fmtTime(pendingDur)} long. Insert it into the note or discard it.</p>
            <div className="confirm-actions">
              <button className="btn btn-ghost" onClick={() => { setPendingBlob(null); onClose(); }}>Discard</button>
              <button className="btn btn-primary" style={{ width: 'auto', marginTop: 0, padding: '9px 20px' }} onClick={() => onSave(pendingBlob, pendingDur)}>Save Recording</button>
            </div>
          </div>
        </div>
      );

      return (
        <div className="recording-card">
          <div className="rec-top"><div className="rec-dot" /><span className="rec-label">Recording…</span><span className="rec-timer">{fmtTime(elapsed)}</span><button className="rec-stop-btn" onClick={stop}>Stop & Review</button><button className="btn-icon" style={{ minWidth: 36, minHeight: 36 }} onClick={discard}><I n="close" s={14} /></button></div>
          <div className="rec-waveform">{bars.map((h, i) => (<div key={i} className="rec-bar" style={{ height: `${h * 100}%` }} />))}</div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  NOTE EDITOR (updated with all new features)
    // ═══════════════════════════════════════════════════════════
    function NoteEditor({ noteId, onBack, allNotes }) {
      const { user } = useContext(AppContext);
      const toast = useToast();
      const [note, setNote] = useState(null);
      const [title, setTitle] = useState('');
      const [blocks, setBlocks] = useState([]);
      const [links, setLinks] = useState([]);
      const [saving, setSaving] = useState(false);
      const [saveStatus, setSaveStatus] = useState('');
      const [showDrawing, setShowDrawing] = useState(false);
      const [isRecording, setIsRecording] = useState(false);
      const [dndVisible, setDndVisible] = useState(false);
      const [uploads, setUploads] = useState([]);
      const [showGrammar, setShowGrammar] = useState(false);
      const [showLinkPicker, setShowLinkPicker] = useState(false);
      const saveTimer = useRef(null);
      const imageRef = useRef(null);
      const sessionStart = useRef(Date.now());
      const lastSnap = useRef('');
      const retryMap = useRef({});
      const isNew = !noteId;

      const rTitle = useRef(title);
      const rBlocks = useRef(blocks);
      const rLinks = useRef(links);
      const rNote = useRef(note);
      useEffect(() => { rTitle.current = title; }, [title]);
      useEffect(() => { rBlocks.current = blocks; }, [blocks]);
      useEffect(() => { rLinks.current = links; }, [links]);
      useEffect(() => { rNote.current = note; }, [note]);

      // Load note
      useEffect(() => {
        if (!noteId) {
          setBlocks([{ id: genId(), type: 'text', content: '', _new: true }]);
          setLinks([]);
          return;
        }
        supabase.from('notes').select('*').eq('id', noteId).single()
          .then(({ data, error }) => {
            if (!error && data) {
              const n = DS._norm(data);
              setNote(n); setTitle(n.title || ''); setBlocks(n.blocks || []); setLinks(n.links || []);
              lastSnap.current = JSON.stringify({ title: n.title || '', blocks: n.blocks || [], links: n.links || [] });
            }
          });
      }, [noteId]);

      useEffect(() => () => {
        const dur = Math.floor((Date.now() - sessionStart.current) / 1000);
        if (dur > 5) DS.logActivity(user.uid, dur);
      }, [user.uid]);

      // ── AUTOSAVE ────────────────────────────────────────────
      const scheduleSave = useCallback(() => {
        clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(async () => {
          if (rBlocks.current.some(b => b._uploading)) return;
          const clean = rBlocks.current
            .filter(b => b.type === 'text' || b.type === 'checklist' || !!b.path)
            .map(({ _new, _uploading, _error, _progress, _fileName, _fileSize, ...r }) => r);
          const snap = JSON.stringify({ title: rTitle.current, blocks: clean, links: rLinks.current });
          if (snap === lastSnap.current) return;
          setSaveStatus('saving'); setSaving(true);
          try {
            const data = { title: rTitle.current, blocks: clean, links: rLinks.current };
            const cur = rNote.current;
            if (!cur && isNew) { const saved = await DS.createNote(user.uid, data); setNote(saved); rNote.current = saved; }
            else if (cur) await DS.updateNote(user.uid, cur.id, data);
            lastSnap.current = snap;
            setSaveStatus('saved'); setTimeout(() => setSaveStatus(''), 2200);
          } catch (e) { toast(`Save failed: ${e.message}`, 'error'); setSaveStatus(''); console.error(e); }
          finally { setSaving(false); }
        }, 2500);
      }, [isNew, user.uid]);

      useEffect(() => { scheduleSave(); }, [title, blocks, links]);

      async function saveNow() {
        if (blocks.some(b => b._uploading)) { toast('Please wait for uploads to finish', 'error'); return; }
        clearTimeout(saveTimer.current); setSaving(true);
        const clean = blocks
          .filter(b => b.type === 'text' || b.type === 'checklist' || !!b.path)
          .map(({ _new, _uploading, _error, _progress, _fileName, _fileSize, ...r }) => r);
        try {
          const data = { title, blocks: clean, links };
          const cur = rNote.current;
          if (!cur && isNew) { const saved = await DS.createNote(user.uid, data); setNote(saved); rNote.current = saved; }
          else if (cur) await DS.updateNote(user.uid, cur.id, data);
          lastSnap.current = JSON.stringify(data);
          setSaveStatus('saved'); setTimeout(() => setSaveStatus(''), 2200);
        } catch (e) { toast(`Save failed: ${e.message}`, 'error'); console.error(e); }
        finally { setSaving(false); }
      }

      // ── BLOCK HELPERS ───────────────────────────────────────
      const setBlock = (id, upd) => setBlocks(bs => bs.map(b => b.id === id ? { ...b, ...upd } : b));
      const delBlock = (id) => { setBlocks(bs => bs.filter(b => b.id !== id)); delete retryMap.current[id]; };
      const addText = () => setBlocks(bs => [...bs, { id: genId(), type: 'text', content: '', _new: true }]);
      const addChecklist = () => setBlocks(bs => [...bs, { id: genId(), type: 'checklist', items: [{ id: genId(), text: '', checked: false }], _new: true }]);
      const moveBlock = (idx, dir) => setBlocks(bs => {
        const a = [...bs], t = idx + dir;
        if (t < 0 || t >= a.length) return a;
        [a[idx], a[t]] = [a[t], a[idx]]; return a;
      });

      // ── UPLOAD TRACKING ─────────────────────────────────────
      function trackUpload(id, label) { setUploads(u => [...u, { id, label, state: 'uploading', progress: 0 }]); }
      function updateUpload(id, progress) { setUploads(u => u.map(x => x.id === id ? { ...x, progress } : x)); }
      function finishUpload(id, success) {
        setUploads(u => u.map(x => x.id === id ? { ...x, state: success ? 'done' : 'error', progress: 100 } : x));
        setTimeout(() => setUploads(u => u.filter(x => x.id !== id)), 3000);
      }

      // ── IMAGE UPLOAD (FIXED: real upload) ──────────────────
      async function doImageUpload(blockId, file) {
        setBlock(blockId, { _uploading: true, _error: null, _progress: 0, _fileName: file.name, _fileSize: file.size });
        trackUpload(blockId, file.name);
        try {
          const meta = await DS.uploadFile(user.uid, file, 'images', pct => {
            setBlock(blockId, { _progress: pct });
            updateUpload(blockId, pct);
          });
          setBlock(blockId, { ...meta, _uploading: false, _progress: 100, _fileName: file.name, _fileSize: file.size });
          finishUpload(blockId, true);
          toast('Image saved', 'success');
        } catch (e) {
          setBlock(blockId, { _uploading: false, _error: e.message, _progress: 0 });
          finishUpload(blockId, false);
          toast('Image upload failed', 'error');
        }
      }

      async function handleImageInput(e) {
        const file = e.target.files?.[0]; if (!file) return; e.target.value = '';
        if (file.size > MAX_FILE_BYTES) { toast(`Too large — max 5MB (yours: ${fmtBytes(file.size)})`, 'error'); return; }
        const blockId = genId();
        setBlocks(bs => [...bs, { id: blockId, type: 'image', path: null, caption: '', _uploading: true, _progress: 0, _fileName: file.name, _fileSize: file.size, _new: true }]);
        retryMap.current[blockId] = { kind: 'image', file };
        await doImageUpload(blockId, file);
      }

      // ── AUDIO UPLOAD (FIXED: real upload) ──────────────────
      async function doAudioUpload(blockId, blob, fileName) {
        setBlock(blockId, { _uploading: true, _error: null, _progress: 0, _fileName: fileName, _fileSize: blob.size });
        trackUpload(blockId, fileName);
        try {
          const file = new File([blob], fileName, { type: blob.type || 'audio/webm' });
          const meta = await DS.uploadFile(user.uid, file, 'audio', pct => {
            setBlock(blockId, { _progress: pct });
            updateUpload(blockId, pct);
          });
          setBlock(blockId, { ...meta, _uploading: false, _progress: 100, _fileName: fileName, _fileSize: blob.size });
          finishUpload(blockId, true);
          toast('Audio saved', 'success');
        } catch (e) {
          setBlock(blockId, { _uploading: false, _error: e.message, _progress: 0 });
          finishUpload(blockId, false);
          toast('Audio upload failed', 'error');
        }
      }

      async function handleAudioSave(blob, dur) {
        setIsRecording(false);
        if (blob.size > MAX_FILE_BYTES) { toast(`Recording too large — max 5MB`, 'error'); return; }
        const fname = `recording-${Date.now()}.webm`;
        const blockId = genId();
        setBlocks(bs => [...bs, { id: blockId, type: 'audio', path: null, duration: dur, _uploading: true, _progress: 0, _fileName: fname, _fileSize: blob.size, _new: true }]);
        retryMap.current[blockId] = { kind: 'audio', blob, fname };
        await doAudioUpload(blockId, blob, fname);
      }

      // ── DRAWING UPLOAD (FIXED: real upload) ────────────────
      async function doDrawingUpload(blockId, dataUrl) {
        setBlock(blockId, { _uploading: true, _error: null, _progress: 0, _fileName: 'drawing.png' });
        trackUpload(blockId, 'drawing.png');
        try {
          const meta = await DS.uploadBase64(user.uid, dataUrl, 'drawing', pct => {
            setBlock(blockId, { _progress: pct });
            updateUpload(blockId, pct);
          });
          setBlock(blockId, { ...meta, _uploading: false, _progress: 100, _fileName: 'drawing.png' });
          finishUpload(blockId, true);
          toast('Drawing saved', 'success');
        } catch (e) {
          setBlock(blockId, { _uploading: false, _error: e.message, _progress: 0 });
          finishUpload(blockId, false);
          toast('Drawing upload failed', 'error');
        }
      }

      async function handleDrawingSave(dataUrl) {
        setShowDrawing(false);
        const blockId = genId();
        setBlocks(bs => [...bs, { id: blockId, type: 'drawing', path: null, _uploading: true, _progress: 0, _fileName: 'drawing.png', _new: true }]);
        retryMap.current[blockId] = { kind: 'drawing', dataUrl };
        await doDrawingUpload(blockId, dataUrl);
      }

      // ── RETRY ───────────────────────────────────────────────
      async function handleRetry(blockId) {
        const r = retryMap.current[blockId]; if (!r) return;
        if (r.kind === 'image') await doImageUpload(blockId, r.file);
        if (r.kind === 'audio') await doAudioUpload(blockId, r.blob, r.fname);
        if (r.kind === 'drawing') await doDrawingUpload(blockId, r.dataUrl);
      }

      // ── DRAG & DROP (FIXED: files now correctly upload) ────
      const dndCounter = useRef(0);
      function handleDragEnter(e) {
        e.preventDefault(); dndCounter.current++;
        if (e.dataTransfer.types.includes('Files')) setDndVisible(true);
      }
      function handleDragLeave(e) {
        e.preventDefault(); dndCounter.current--;
        if (dndCounter.current <= 0) { setDndVisible(false); dndCounter.current = 0; }
      }
      function handleDragOver(e) { e.preventDefault(); }
      async function handleDrop(e) {
        e.preventDefault(); setDndVisible(false); dndCounter.current = 0;
        const files = Array.from(e.dataTransfer.files);
        // Process each file sequentially to avoid race conditions
        for (const file of files) {
          if (file.size > MAX_FILE_BYTES) { toast(`${file.name} is too large (max 5MB)`, 'error'); continue; }
          const blockId = genId();
          if (file.type.startsWith('image/')) {
            setBlocks(bs => [...bs, { id: blockId, type: 'image', path: null, caption: '', _uploading: true, _progress: 0, _fileName: file.name, _fileSize: file.size, _new: true }]);
            retryMap.current[blockId] = { kind: 'image', file };
            await doImageUpload(blockId, file);
          } else if (file.type.startsWith('audio/')) {
            setBlocks(bs => [...bs, { id: blockId, type: 'audio', path: null, duration: 0, _uploading: true, _progress: 0, _fileName: file.name, _fileSize: file.size, _new: true }]);
            retryMap.current[blockId] = { kind: 'audio', blob: file, fname: file.name };
            await doAudioUpload(blockId, file, file.name);
          } else { toast(`${file.name}: unsupported file type`, 'error'); }
        }
      }

      // ── PASTE ───────────────────────────────────────────────
      useEffect(() => {
        async function onPaste(e) {
          const items = Array.from(e.clipboardData?.items || []);
          for (const item of items) {
            if (item.type.startsWith('image/')) {
              const file = item.getAsFile(); if (!file) continue;
              if (file.size > MAX_FILE_BYTES) { toast('Pasted image too large (max 5MB)', 'error'); continue; }
              const blockId = genId();
              const fname = `pasted-${Date.now()}.png`;
              setBlocks(bs => [...bs, { id: blockId, type: 'image', path: null, caption: '', _uploading: true, _progress: 0, _fileName: fname, _fileSize: file.size, _new: true }]);
              retryMap.current[blockId] = { kind: 'image', file };
              toast('Pasting image…');
              await doImageUpload(blockId, file);
            }
          }
        }
        window.addEventListener('paste', onPaste);
        return () => window.removeEventListener('paste', onPaste);
      }, [user.uid]);

      // ── GRAMMAR: apply corrected text to text blocks ────────
      function handleGrammarApply(corrected) {
        const paragraphs = corrected.split(/\n\n+/);
        const textBlockIds = blocks.filter(b => b.type === 'text').map(b => b.id);
        setBlocks(bs => {
          let paraIdx = 0;
          return bs.map(b => {
            if (b.type !== 'text') return b;
            const idx = textBlockIds.indexOf(b.id);
            if (idx < 0) return b;
            const content = paragraphs[paraIdx] || '';
            paraIdx++;
            return { ...b, content };
          });
        });
      }

      // ── LINKED NOTES ────────────────────────────────────────
      function handleUnlink(id) { setLinks(l => l.filter(x => x !== id)); }

      const hasContent = blocks.some(b => b.type !== 'text' || b.content?.trim());
      const anyUploading = blocks.some(b => b._uploading);

      return (
        <div className="app-shell"
          onDragEnter={handleDragEnter}
          onDragLeave={handleDragLeave}
          onDragOver={handleDragOver}
          onDrop={handleDrop}>

          <DnDOverlay visible={dndVisible} />
          <GlobalUploadBanner uploads={uploads} />

          <nav className="top-nav">
            <button className="btn btn-ghost" style={{ gap: 5, padding: '7px 12px', fontSize: 13 }} onClick={onBack}>
              <I n="back" s={14} /> Notes
            </button>
            <div className="nav-spacer" />
            <button
              className="btn btn-ghost"
              style={{ gap: 5, padding: '7px 12px', fontSize: 13, minHeight: 36, borderColor: showGrammar ? 'var(--accent)' : undefined, color: showGrammar ? 'var(--accent)' : undefined }}
              onClick={() => setShowGrammar(v => !v)}
            >
              <I n="sparkle" s={13} /> AI
            </button>
            <div className={`editor-save-status ${saveStatus}`}>
              {saveStatus === 'saving' && <><div className="spinner spinner-xs" style={{ borderTopColor: 'var(--accent)' }} />Saving…</>}
              {saveStatus === 'saved' && <><I n="check" s={12} />Saved</>}
            </div>
            <button className="btn btn-primary" style={{ width: 'auto', padding: '8px 18px', fontSize: 13, marginTop: 0 }} onClick={saveNow} disabled={saving}>
              {saving ? 'Saving…' : 'Save'}
            </button>
          </nav>

          <div className="editor-page">
            <textarea className="editor-title" placeholder="Untitled" value={title}
              onChange={e => setTitle(e.target.value)} rows={1}
              style={{ overflow: 'hidden', minHeight: 48 }}
              onInput={e => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }} />
            <div className="editor-date">{note?.createdAt ? fmtDate(note.createdAt) : 'New note'}</div>

            {/* Grammar panel - manual trigger only */}
            {showGrammar && (
              <GrammarPanel
                blocks={blocks}
                onApply={handleGrammarApply}
                onClose={() => setShowGrammar(false)}
              />
            )}

            {!hasContent && (
              <div className="editor-empty">
                <div style={{ fontSize: 32, opacity: 0.25 }}>✍️</div>
                <p>Start writing, or drop files here</p>
                <p className="editor-empty-hint">Paste an image with Ctrl+V · Drag files to upload</p>
                <div className="editor-empty-btns">
                  <button className="editor-empty-btn" onClick={addText}><I n="text" s={13} />Text</button>
                  <button className="editor-empty-btn" onClick={() => imageRef.current?.click()} disabled={isRecording}><I n="image" s={13} />Image</button>
                  <button className="editor-empty-btn" onClick={() => setIsRecording(true)} disabled={isRecording}><I n="mic" s={13} />Audio</button>
                  <button className="editor-empty-btn" onClick={() => setShowDrawing(true)} disabled={isRecording}><I n="pencil" s={13} />Drawing</button>

    // ═══════════════════════════════════════════════════════════
    //  HEATMAP
    // ═══════════════════════════════════════════════════════════
    function ActivityHeatmap({ user }) {
      const [logs, setLogs] = useState(null);
      useEffect(() => { DS.getActivityLogs(user.uid).then(setLogs); }, [user.uid]);
      const { cells, monthLabels } = useMemo(() => {
        const map = {};
        if (logs) for (const l of logs) map[l.date] = (map[l.date] || 0) + (l.duration || 0);
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const start = new Date(today); start.setDate(start.getDate() - 363 - start.getDay());
        const days = []; const cur = new Date(start);
        while (cur <= today) { days.push(new Date(cur)); cur.setDate(cur.getDate() + 1); }
        while (days.length % 7 !== 0) { days.push(new Date(cur)); cur.setDate(cur.getDate() + 1); }
        function cc(s) { if (!s || !s) return 'var(--paper-3)'; const m = s / 60; if (m < 15) return '#c6e48b'; if (m < 30) return '#7bc96f'; if (m < 60) return '#239a3b'; return '#196127'; }
        const cells = days.map(d => { const ymd = toYMD(d); const dur = map[ymd] || 0; return { ymd, dur, color: cc(dur), isFuture: d > today, label: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) }; });
        const weeks = Math.ceil(cells.length / 7);
        const ml = []; for (let w = 0; w < weeks; w++) { const f = cells[w * 7]; if (!f) { ml.push(''); continue; } ml.push(f.date?.getDate() <= 7 ? new Date(f.ymd).toLocaleDateString('en-US', { month: 'short' }) : ''); }
        return { cells, monthLabels: ml };
      }, [logs]);
      if (logs === null) return <div className="heatmap-loading">Loading…</div>;
      const weeks = Math.ceil(cells.length / 7);
      return (
        <div>
          <div className="heatmap-wrap">
            <div style={{ display: 'grid', gridTemplateColumns: `repeat(${weeks},12px)`, gap: '3px', marginBottom: '3px' }}>
              {monthLabels.map((l, i) => <div key={i} className="heatmap-month-label">{l}</div>)}
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: `repeat(${weeks},12px)`, gridTemplateRows: 'repeat(7,12px)', gap: '3px', gridAutoFlow: 'column' }}>
              {cells.map(c => (<div key={c.ymd} className="heatmap-cell" style={{ background: c.isFuture ? 'transparent' : c.color, border: c.isFuture ? '1px dashed var(--paper-3)' : 'none' }} title={c.isFuture ? '' : `${c.label}${c.dur ? ': ' + fmtMinutes(c.dur) : ': no activity'}`} />))}
            </div>
          </div>
          <div className="heatmap-legend">
            <span>Less</span>
            {['var(--paper-3)', '#c6e48b', '#7bc96f', '#239a3b', '#196127'].map((c, i) => (<div key={i} className="heatmap-legend-cell" style={{ background: c, border: c === 'var(--paper-3)' ? '1px solid var(--paper-4)' : 'none' }} />))}
            <span>More</span>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  NEW: GRAPH VIEW (simple force-directed layout)
    // ═══════════════════════════════════════════════════════════
    function GraphView({ notes, onBack, onOpen }) {
      const svgRef = useRef(null);
      const [tooltip, setTooltip] = useState(null);
      const [transform, setTransform] = useState({ x: 0, y: 0, k: 1 });
      const isDragging = useRef(false);
      const dragStart = useRef(null);
      const panStart = useRef(null);

      // Simple force-directed layout: position nodes
      const MAX_NODES = 50;
      const limitedNotes = notes.slice(0, MAX_NODES);

      const { nodes, edges } = useMemo(() => {
        if (!limitedNotes.length) return { nodes: [], edges: [] };


        // Build node map
        const nodeMap = {};
        limitedNotes.forEach((n, i) => {
          const angle = (i / limitedNotes.length) * 2 * Math.PI;
          const r = Math.min(200, 60 + limitedNotes.length * 15);
          nodeMap[n.id] = {
            id: n.id,
            title: n.title || 'Untitled',
            x: 400 + r * Math.cos(angle),
            y: 300 + r * Math.sin(angle),
            links: n.links || [],
            hasMedia: (n.blocks || []).some(b => ['image', 'audio', 'drawing'].includes(b.type)),
            blockCount: (n.blocks || []).length,
          };
        });

        // Simple repulsion + run iterations
        const nodeArr = Object.values(nodeMap);
        for (let iter = 0; iter < 80; iter++) {
          // Repulsion
          for (let i = 0; i < nodeArr.length; i++) {
            for (let j = i + 1; j < nodeArr.length; j++) {
              const a = nodeArr[i], b = nodeArr[j];
              const dx = a.x - b.x, dy = a.y - b.y;
              const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
              const force = 3000 / (dist * dist);
              const fx = (dx / dist) * force, fy = (dy / dist) * force;
              a.x += fx; a.y += fy; b.x -= fx; b.y -= fy;
            }
          }
          // Attraction along edges
          limitedNotes.forEach(n => {
            (n.links || []).forEach(lid => {
              const a = nodeMap[n.id], b = nodeMap[lid];
              if (!a || !b) return;
              const dx = b.x - a.x, dy = b.y - a.y;
              const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
              const force = dist * 0.02;
              const fx = (dx / dist) * force, fy = (dy / dist) * force;
              a.x += fx; a.y += fy; b.x -= fx; b.y -= fy;
            });
          });
          // Center gravity
          const cx = nodeArr.reduce((s, n) => s + n.x, 0) / nodeArr.length;
          const cy = nodeArr.reduce((s, n) => s + n.y, 0) / nodeArr.length;
          nodeArr.forEach(n => { n.x += (400 - cx) * 0.01; n.y += (300 - cy) * 0.01; });
        }

        const edges = [];
        limitedNotes.forEach(n => {
          (n.links || []).forEach(lid => {
            if (nodeMap[lid]) edges.push({ source: n.id, target: lid });
          });
        });

        return { nodes: nodeArr, edges };
      }, [notes]);

      // Pan
      function handleSvgMouseDown(e) {
        if (e.target.closest('.graph-node')) return;
        isDragging.current = true;
        dragStart.current = { x: e.clientX, y: e.clientY };
        panStart.current = { x: transform.x, y: transform.y };
      }
      function handleSvgMouseMove(e) {
        if (!isDragging.current || !dragStart.current) return;
        const dx = e.clientX - dragStart.current.x;
        const dy = e.clientY - dragStart.current.y;
        setTransform(t => ({ ...t, x: panStart.current.x + dx, y: panStart.current.y + dy }));
      }
      function handleSvgMouseUp() { isDragging.current = false; }

      // Zoom
      function handleWheel(e) {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        setTransform(t => ({ ...t, k: Math.max(0.3, Math.min(3, t.k * delta)) }));
      }

      function zoomIn() { setTransform(t => ({ ...t, k: Math.min(3, t.k * 1.2) })); }
      function zoomOut() { setTransform(t => ({ ...t, k: Math.max(0.3, t.k / 1.2) })); }
      function resetView() { setTransform({ x: 0, y: 0, k: 1 }); }

      const nodeColors = { default: 'var(--accent)', media: 'var(--blue)', linked: 'var(--green)' };

      return (
        <div className="app-shell">
          <nav className="top-nav">
            <button className="btn btn-ghost" style={{ gap: 5, padding: '7px 12px', fontSize: 13 }} onClick={onBack}>
              <I n="back" s={14} /> Notes
            </button>
            <div className="nav-spacer" />
            <span style={{ fontFamily: 'var(--font-display)', fontSize: 16, fontWeight: 600 }}>Graph View</span>
            <div className="nav-spacer" />
            <span style={{ fontSize: 12, color: 'var(--ink-4)' }}>{limitedNotes.length} notes · {edges.length} links</span>
          </nav>

          <div className="graph-page">
            <div className="graph-canvas-wrap" ref={svgRef}
              onMouseDown={handleSvgMouseDown}
              onMouseMove={handleSvgMouseMove}
              onMouseUp={handleSvgMouseUp}
              onMouseLeave={handleSvgMouseUp}
              onWheel={handleWheel}>

              {limitedNotes.length === 0 ? (
                <div className="graph-empty">
                  <div style={{ fontSize: 48, opacity: 0.2 }}>🕸️</div>
                  <div style={{ fontFamily: 'var(--font-display)', fontSize: 20, fontWeight: 600 }}>No notes yet</div>
                  <div style={{ fontSize: 14, color: 'var(--ink-3)' }}>Create some notes and link them to see the graph.</div>
                </div>
              ) : (
                <svg id="graph-svg"
                  viewBox="0 0 800 600"
                  style={{ userSelect: 'none' }}>
                  <defs>
                    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                      <polygon points="0 0, 8 3, 0 6" fill="var(--paper-4)" />
                    </marker>
                  </defs>
                  <g transform={`translate(${transform.x},${transform.y}) scale(${transform.k})`}>
                    {/* Edges */}
                    {edges.map((e, i) => {
                      const s = nodes.find(n => n.id === e.source);
                      const t = nodes.find(n => n.id === e.target);
                      if (!s || !t) return null;
                      return (
                        <line key={i}
                          x1={s.x} y1={s.y} x2={t.x} y2={t.y}
                          stroke="var(--paper-4)" strokeWidth={1.5}
                          strokeDasharray="4 3" opacity={0.7}
                          markerEnd="url(#arrowhead)"
                        />
                      );
                    })}
                    {/* Nodes */}
                    {nodes.map(node => {
                      const r = 12 + Math.min(node.blockCount * 1.5, 10);
                      const hasLinks = node.links.length > 0;
                      const color = node.hasMedia ? '#2d5fa8' : hasLinks ? '#3a7d5c' : '#c0622a';
                      return (
                        <g key={node.id} className="graph-node"
                          onClick={() => onOpen(node.id)}
                          onMouseEnter={e => {
                            const rect = svgRef.current.getBoundingClientRect();
                            setTooltip({ x: e.clientX - rect.left + 12, y: e.clientY - rect.top - 10, title: node.title });
                          }}
                          onMouseLeave={() => setTooltip(null)}>
                          <circle cx={node.x} cy={node.y} r={r} fill={color} fillOpacity={0.85} stroke={color} strokeWidth={2} />
                          <text x={node.x} y={node.y + r + 12} textAnchor="middle" fontSize={11} fill="var(--ink-3)" fontFamily="var(--font-body)">
                            {node.title.length > 16 ? node.title.slice(0, 14) + '…' : node.title}
                          </text>
                        </g>
                      );
                    })}
                  </g>
                </svg>
              )}

              {/* Tooltip */}
              {tooltip && (
                <div className="graph-tooltip" style={{ left: tooltip.x, top: tooltip.y }}>{tooltip.title}</div>
              )}

              {/* Legend */}
              <div className="graph-legend">
                <div className="graph-legend-title">Legend</div>
                <div className="graph-legend-item"><div className="graph-legend-dot" style={{ background: '#c0622a' }} /><span>Text note</span></div>
                <div className="graph-legend-item"><div className="graph-legend-dot" style={{ background: '#2d5fa8' }} /><span>Has media</span></div>
                <div className="graph-legend-item"><div className="graph-legend-dot" style={{ background: '#3a7d5c' }} /><span>Has links</span></div>
              </div>

              {/* Controls */}
              <div className="graph-controls">
                <button className="graph-ctrl-btn" onClick={zoomIn} title="Zoom in">+</button>
                <button className="graph-ctrl-btn" onClick={zoomOut} title="Zoom out">−</button>
                <button className="graph-ctrl-btn" onClick={resetView} title="Reset view" style={{ fontSize: 11 }}>↺</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

              <div className="profile-section-title">Data</div>
              <div className="profile-row" style={{ cursor: 'pointer' }} onClick={exportCSV}>
                <div className="profile-row-icon"><I n="download" s={13} /></div>
                <div className="profile-row-label">Export Notes</div>
                <div className="profile-row-value">CSV <I n="download" s={12} /></div>
              </div>
            </div>
            <div className="profile-section">
              <div className="profile-section-title">Activity — last 52 weeks</div>
              <ActivityHeatmap user={user} />
            </div>
            <div style={{ marginTop: 12 }}>
              <button className="btn btn-danger" style={{ width: '100%', justifyContent: 'center', padding: '13px', fontSize: 14 }} onClick={logout}>Sign Out</button>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  ROOT APP
    // ═══════════════════════════════════════════════════════════
    function App() {
      const [user, setUser] = useState(null);
      const [ready, setReady] = useState(false);
      const [theme, setThemeRaw] = useState(() => localStorage.getItem('inkwell-theme') || 'light');
      const [page, setPage] = useState('dashboard');
      const [noteId, setNoteId] = useState(null);
      // Global notes cache (for graph view + link picker)
      const [allNotes, setAllNotes] = useState([]);

      const setTheme = t => { setThemeRaw(t); localStorage.setItem('inkwell-theme', t); document.documentElement.setAttribute('data-theme', t); };

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        const unsub = DS.onAuthChange(u => { setUser(u); setReady(true); });
        return () => typeof unsub === 'function' && unsub();
      }, []);

      // Subscribe to notes globally for graph + link picker
      useEffect(() => {
        if (!user) return;
        const unsub = DS.subscribeNotes(user.uid, setAllNotes);
        return () => typeof unsub === 'function' && unsub();
      }, [user]);

      window._goto = (p, id = null) => { setPage(p); if (id !== null) setNoteId(id); };

      if (!ready) return (
        <div className="loading-screen">
          <div className="loading-logo">Ink<span>well</span></div>
          <div className="spinner" />
        </div>
      );

      return (
        <AppContext.Provider value={{ user, setUser, theme, setTheme }}>
          {!user && <AuthPage />}
          {user && page === 'dashboard' && (
            <Dashboard
              onNew={() => { setNoteId(null); setPage('editor'); }}
              onOpen={id => { setNoteId(id); setPage('editor'); }}
              onGraph={() => setPage('graph')}
            />
          )}
          {user && page === 'editor' && (
            <NoteEditor
              noteId={noteId}
              onBack={() => setPage('dashboard')}
              allNotes={allNotes}
            />
          )}
          {user && page === 'graph' && (
            <GraphView
              notes={allNotes}
              onBack={() => setPage('dashboard')}
              onOpen={id => { setNoteId(id); setPage('editor'); }}
            />
          )}
          {user && page === 'profile' && <ProfilePage onBack={() => setPage('dashboard')} />}
        </AppContext.Provider>
      );
    }

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true };
      }

      componentDidCatch(error, errorInfo) {
        console.error('[App Crash]', error, errorInfo);
      }

      render() {
        if (this.state.hasError) {
          return (
            <div className="loading-screen">
              <div className="loading-logo">Ink<span>well</span></div>
              <p style={{ color: 'var(--ink-3)', fontSize: 14 }}>
                Something went wrong. Refresh to continue.
              </p>
              <button className="btn btn-primary" style={{ marginTop: 10 }} onClick={() => window.location.reload()}>
                Refresh
              </button>
            </div>
          );
        }

        return this.props.children;
      }
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <ErrorBoundary>
        <ToastProvider>
          <App />
        </ToastProvider>
      </ErrorBoundary>
    );
  </script>
</body>

</html>
