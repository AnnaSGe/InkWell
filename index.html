<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Inkwell — Personal Journal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --ink: #1a1510;
      --ink-2: #3d3530;
      --ink-3: #6b6058;
      --ink-4: #9e948a;
      --paper: #faf8f4;
      --paper-2: #f3efe8;
      --paper-3: #ece6dc;
      --paper-4: #e0d9cd;
      --accent: #c0622a;
      --accent-2: #e07840;
      --accent-soft: rgba(192, 98, 42, 0.1);
      --accent-softer: rgba(192, 98, 42, 0.06);
      --green: #3a7d5c;
      --green-soft: rgba(58, 125, 92, 0.12);
      --blue: #2d5fa8;
      --blue-soft: rgba(45, 95, 168, 0.1);
      --red: #c0352a;
      --red-soft: rgba(192, 53, 42, 0.1);
      --amber: #b45309;
      --amber-soft: rgba(180, 83, 9, 0.1);
      --shadow-sm: 0 1px 3px rgba(26, 21, 16, 0.08), 0 1px 2px rgba(26, 21, 16, 0.05);
      --shadow-md: 0 4px 12px rgba(26, 21, 16, 0.1), 0 2px 6px rgba(26, 21, 16, 0.07);
      --shadow-lg: 0 12px 40px rgba(26, 21, 16, 0.12), 0 4px 16px rgba(26, 21, 16, 0.07);
      --shadow-xl: 0 24px 64px rgba(26, 21, 16, 0.15), 0 8px 24px rgba(26, 21, 16, 0.08);
      --radius: 10px;
      --radius-sm: 6px;
      --radius-xs: 4px;
      --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-spring: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --nav-h: 58px;
      --toolbar-h: 60px;
      --media-accent: var(--blue);
      --media-accent-soft: var(--blue-soft);
    }

    [data-theme="dark"] {
      --ink: #f0ece4;
      --ink-2: #d4cec6;
      --ink-3: #a09890;
      --ink-4: #6e6860;
      --paper: #1c1a17;
      --paper-2: #242220;
      --paper-3: #2e2c28;
      --paper-4: #3a3830;
      --accent: #e07840;
      --accent-2: #f0924a;
      --accent-soft: rgba(224, 120, 64, 0.14);
      --accent-softer: rgba(224, 120, 64, 0.06);
      --green-soft: rgba(58, 125, 92, 0.2);
      --blue-soft: rgba(45, 95, 168, 0.18);
      --red-soft: rgba(192, 53, 42, 0.18);
      --amber-soft: rgba(180, 83, 9, 0.18);
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.28);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.32);
      --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.38);
      --shadow-xl: 0 24px 64px rgba(0, 0, 0, 0.45);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: var(--font-body);
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: var(--paper-2);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--paper-4);
      border-radius: 3px;
    }

    /* ── AUTH ── */
    .auth-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    @media(max-width:768px) {
      .auth-page {
        grid-template-columns: 1fr
      }

      .auth-brand {
        display: none
      }
    }

    .auth-brand {
      background: var(--ink);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }

    .auth-brand::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 70%, rgba(192, 98, 42, 0.2) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(224, 120, 64, 0.1) 0%, transparent 50%);
    }

    .brand-logo {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 700;
      color: var(--paper);
      letter-spacing: -1px;
      position: relative;
      z-index: 1;
    }

    .brand-logo span {
      color: #e07840;
    }

    .brand-tagline {
      font-size: 15px;
      color: rgba(240, 236, 228, 0.45);
      margin-top: 12px;
      font-weight: 300;
      letter-spacing: 0.5px;
      position: relative;
      z-index: 1;
    }

    .brand-lines {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    .brand-lines::before,
    .brand-lines::after {
      content: '';
      position: absolute;
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 50%;
    }

    .brand-lines::before {
      width: 400px;
      height: 400px;
      top: -100px;
      right: -100px;
    }

    .brand-lines::after {
      width: 250px;
      height: 250px;
      bottom: 80px;
      left: -50px;
    }

    .auth-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .auth-box {
      width: 100%;
      max-width: 400px;
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 32px;
      border-bottom: 2px solid var(--paper-3);
    }

    .auth-tab {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-4);
      cursor: pointer;
      position: relative;
      transition: color var(--transition);
      letter-spacing: 0.4px;
      text-transform: uppercase;
      min-height: 44px;
    }

    .auth-tab.active {
      color: var(--accent);
    }

    .auth-tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
    }

    .auth-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .auth-subtitle {
      font-size: 14px;
      color: var(--ink-3);
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--ink-3);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      background: var(--paper-2);
      border: 1.5px solid var(--paper-3);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 16px;
      color: var(--ink);
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
      background: var(--paper);
    }

    .field input::placeholder {
      color: var(--ink-4);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
      white-space: nowrap;
      min-height: 44px;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-2);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .btn-primary:active {
      transform: none;
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-ghost {
      background: transparent;
      color: var(--ink-2);
      border: 1.5px solid var(--paper-3);
    }

    .btn-ghost:hover {
      background: var(--paper-2);
      border-color: var(--paper-4);
    }

    .btn-icon {
      background: transparent;
      color: var(--ink-3);
      padding: 8px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .btn-icon:hover {
      background: var(--paper-2);
      color: var(--ink);
    }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1.5px solid rgba(192, 53, 42, 0.25);
      font-size: 13px;
    }

    .btn-danger:hover {
      background: var(--red-soft);
      border-color: var(--red);
    }

    .error-msg {
      background: var(--red-soft);
      border: 1px solid rgba(192, 53, 42, 0.3);
      color: var(--red);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .success-msg {
      background: var(--green-soft);
      border: 1px solid rgba(58, 125, 92, 0.3);
      color: var(--green);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 16px;
    }

    /* ── SHELL ── */
    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-nav {
      height: var(--nav-h);
      background: var(--paper);
      border-bottom: 1px solid var(--paper-3);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .nav-logo span {
      color: var(--accent);
    }

    .nav-spacer {
      flex: 1;
    }

    .nav-search {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--paper-2);
      border: 1.5px solid var(--paper-3);
      border-radius: 20px;
      padding: 7px 14px;
      flex: 1;
      max-width: 300px;
      transition: border-color var(--transition);
    }

    .nav-search:focus-within {
      border-color: var(--accent);
      background: var(--paper);
    }

    .nav-search input {
      background: none;
      border: none;
      outline: none;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--ink);
      width: 100%;
    }

    .nav-search input::placeholder {
      color: var(--ink-4);
    }

    .nav-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity var(--transition);
      text-decoration: none;
    }

    .nav-avatar:hover {
      opacity: 0.85;
    }

    /* ── DASHBOARD ── */
    .dashboard {
      flex: 1;
      padding: 32px 24px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    @media(max-width:600px) {
      .dashboard {
        padding: 20px 16px
      }
    }

    .dashboard-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .dashboard-title {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 600;
      line-height: 1;
    }

    .dashboard-subtitle {
      font-size: 14px;
      color: var(--ink-3);
      margin-top: 4px;
    }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 14px;
    }

    @media(max-width:600px) {
      .notes-grid {
        grid-template-columns: 1fr
      }
    }

    .note-card {
      background: var(--paper-2);
      border: 1.5px solid var(--paper-3);
      border-radius: var(--radius);
      padding: 18px;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 130px;
    }

    .note-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .note-card.pinned {
      border-color: var(--accent);
      background: var(--accent-softer);
    }

    .note-card-pin {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 11px;
    }

    .note-card-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      line-height: 1.3;
      padding-right: 20px;
    }

    .note-card-preview {
      font-size: 13px;
      color: var(--ink-3);
      line-height: 1.55;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
    }

    .note-card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }

    .note-card-date {
      font-size: 11px;
      color: var(--ink-4);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .note-card-badges {
      display: flex;
      gap: 4px;
    }

    .media-badge {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
    }

    .media-badge.img {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .media-badge.audio {
      background: var(--green-soft);
      color: var(--green);
    }

    .media-badge.draw {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .note-card-actions {
      display: flex;
      gap: 3px;
      opacity: 0;
      transition: opacity var(--transition);
      position: absolute;
      bottom: 10px;
      right: 10px;
    }

    .note-card:hover .note-card-actions {
      opacity: 1;
    }

    .card-action-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: none;
      background: var(--paper-3);
      color: var(--ink-3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      transition: all var(--transition);
    }

    .card-action-btn:hover {
      background: var(--paper-4);
      color: var(--ink);
    }

    .card-action-btn.del:hover {
      background: var(--red-soft);
      color: var(--red);
    }

    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
    }

    .empty-icon {
      font-size: 52px;
      margin-bottom: 14px;
      opacity: 0.25;
    }

    .empty-state h3 {
      font-family: var(--font-display);
      font-size: 21px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 14px;
      color: var(--ink-3);
    }

    /* ── EDITOR ── */
    .editor-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      padding: 0 24px;
      padding-bottom: calc(var(--toolbar-h) + 32px + env(safe-area-inset-bottom));
    }

    @media(max-width:600px) {
      .editor-page {
        padding: 0 14px;
        padding-bottom: calc(var(--toolbar-h)+32px+env(safe-area-inset-bottom));
      }
    }

    .editor-topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 0;
      border-bottom: 1px solid var(--paper-3);
      margin-bottom: 22px;
      position: sticky;
      top: var(--nav-h);
      background: var(--paper);
      z-index: 90;
    }

    .editor-save-status {
      font-size: 12px;
      color: var(--ink-4);
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 72px;
    }

    .editor-save-status.saving {
      color: var(--accent);
    }

    .editor-save-status.saved {
      color: var(--green);
    }

    .editor-title {
      font-family: var(--font-display);
      font-size: 34px;
      font-weight: 700;
      color: var(--ink);
      border: none;
      background: none;
      outline: none;
      width: 100%;
      line-height: 1.2;
      resize: none;
      font-style: italic;
      margin-bottom: 4px;
      font-size: clamp(24px, 5vw, 36px);
    }

    .editor-title::placeholder {
      color: var(--paper-4);
    }

    .editor-date {
      font-size: 11px;
      color: var(--ink-4);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 22px;
    }

    .editor-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 48px 20px;
      border: 2px dashed var(--paper-3);
      border-radius: var(--radius);
      margin-bottom: 16px;
      transition: border-color var(--transition), background var(--transition);
    }

    .editor-empty.drag-over {
      border-color: var(--accent);
      background: var(--accent-softer);
    }

    .editor-empty p {
      font-size: 14px;
      color: var(--ink-4);
      font-style: italic;
      text-align: center;
    }

    .editor-empty-hint {
      font-size: 12px;
      color: var(--ink-4);
      opacity: 0.7;
    }

    .editor-empty-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .editor-empty-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      background: var(--paper-2);
      border: 1.5px solid var(--paper-3);
      border-radius: 20px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-3);
      cursor: pointer;
      transition: all var(--transition);
      min-height: 40px;
    }

    .editor-empty-btn:hover {
      background: var(--paper-3);
      color: var(--ink);
    }

    .editor-empty-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* ── BLOCKS ── */
    .blocks-container {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .block-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      position: relative;
      border-radius: 8px;
      transition: background var(--transition);
    }

    .block-wrapper:hover {
      background: var(--paper-2);
    }

    .block-wrapper:hover .block-side-actions {
      opacity: 1;
    }

    .block-content-area {
      flex: 1;
      min-width: 0;
    }

    .block-side-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      opacity: 0;
      transition: opacity var(--transition);
      padding: 8px 2px;
      flex-shrink: 0;
    }

    .block-side-btn {
      width: 28px;
      height: 28px;
      border-radius: 5px;
      border: none;
      background: transparent;
      color: var(--ink-4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      transition: all var(--transition);
    }

    .block-side-btn:hover {
      background: var(--paper-3);
      color: var(--ink);
    }

    .block-side-btn.del-block:hover {
      background: var(--red-soft);
      color: var(--red);
    }

    @keyframes blockIn {
      from {
        opacity: 0;
        transform: translateY(5px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .block-new {
      animation: blockIn 0.2s ease forwards;
    }

    .text-block textarea {
      width: 100%;
      background: none;
      border: none;
      outline: none;
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.72;
      color: var(--ink);
      resize: none;
      padding: 8px 0;
      min-height: 40px;
    }

    .text-block textarea::placeholder {
      color: var(--ink-4);
    }

    /* ── CHECKLIST BLOCK ── */
    .checklist-block {
      padding: 6px 0;
    }

    .checklist-items {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 5px 4px;
      border-radius: 6px;
      transition: background var(--transition);
    }

    .checklist-item:hover {
      background: var(--paper-2);
    }

    .checklist-checkbox {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 2px solid var(--paper-4);
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .checklist-checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checklist-item-text {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink);
      resize: none;
      padding: 0;
      min-height: 24px;
    }

    .checklist-item-text.done {
      text-decoration: line-through;
      color: var(--ink-4);
    }

    .checklist-item-text::placeholder {
      color: var(--ink-4);
    }

    .checklist-add-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 4px;
      margin-top: 2px;
    }

    .checklist-add-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: none;
      border: 1.5px dashed var(--paper-3);
      border-radius: 20px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-4);
      cursor: pointer;
      transition: all var(--transition);
    }

    .checklist-add-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    .checklist-del-btn {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: none;
      background: none;
      color: var(--ink-4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      opacity: 0;
      transition: all var(--transition);
      flex-shrink: 0;
    }

    .checklist-item:hover .checklist-del-btn {
      opacity: 1;
    }

    .checklist-del-btn:hover {
      background: var(--red-soft);
      color: var(--red);
    }

    .checklist-progress {
      height: 3px;
      background: var(--paper-3);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .checklist-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* ── MEDIA BLOCKS ── */
    .media-block {
      padding: 8px 0;
    }

    .media-card {
      border-radius: var(--radius);
      border: 1.5px solid var(--paper-3);
      overflow: hidden;
      transition: border-color var(--transition);
      background: var(--paper-2);
    }

    .media-card:hover {
      border-color: var(--paper-4);
    }

    .media-upload-state {
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .media-upload-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .media-upload-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
    }

    .media-upload-info {
      flex: 1;
      min-width: 0;
    }

    .media-upload-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .media-upload-meta {
      font-size: 11px;
      color: var(--ink-4);
      margin-top: 1px;
    }

    .media-upload-pct {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .upload-progress-track {
      height: 4px;
      background: var(--paper-3);
      border-radius: 2px;
      overflow: hidden;
    }

    .upload-progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.15s linear;
    }

    .fill-uploading {
      background: var(--accent);
    }

    .fill-success {
      background: var(--green);
    }

    .fill-error {
      background: var(--red);
    }

    .upload-status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--ink-3);
    }

    .media-error-state {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .media-error-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .media-error-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--red-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 15px;
    }

    .media-error-info {
      flex: 1;
    }

    .media-error-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--red);
    }

    .media-error-reason {
      font-size: 12px;
      color: var(--ink-3);
      margin-top: 3px;
      line-height: 1.4;
    }

    .media-error-guidance {
      font-size: 11px;
      color: var(--ink-4);
      padding: 8px 10px;
      background: var(--paper-3);
      border-radius: var(--radius-sm);
      line-height: 1.4;
    }

    .media-error-actions {
      display: flex;
      gap: 8px;
    }

    .btn-retry {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      background: var(--red-soft);
      border: 1.5px solid rgba(192, 53, 42, 0.3);
      color: var(--red);
      border-radius: 20px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      min-height: 36px;
    }

    .btn-retry:hover {
      background: rgba(192, 53, 42, 0.15);
    }

    .btn-discard {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      background: var(--paper-3);
      border: 1.5px solid transparent;
      color: var(--ink-3);
      border-radius: 20px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      min-height: 36px;
    }

    .btn-discard:hover {
      background: var(--paper-4);
      color: var(--ink);
    }

    .media-loaded-img {
      display: block;
      width: 100%;
      max-height: 480px;
      object-fit: cover;
    }

    .media-caption-wrap {
      padding: 8px 14px 10px;
      border-top: 1px solid var(--paper-3);
    }

    .media-caption {
      width: 100%;
      background: none;
      border: none;
      outline: none;
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--ink-3);
      font-style: italic;
      resize: none;
      padding: 0;
      line-height: 1.5;
      font-size: 16px;
    }

    .media-caption::placeholder {
      color: var(--ink-4);
    }

    .media-footer {
      padding: 8px 14px;
      border-top: 1px solid var(--paper-3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .media-footer-meta {
      font-size: 11px;
      color: var(--ink-4);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .media-footer-status {
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-saved {
      color: var(--green);
    }

    .status-unsaved {
      color: var(--amber);
    }

    .media-fallback {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      gap: 10px;
    }

    .media-fallback-icon {
      font-size: 28px;
      opacity: 0.4;
    }

    .media-fallback-msg {
      font-size: 13px;
      color: var(--ink-4);
      text-align: center;
    }

    .media-fallback-refresh {
      padding: 6px 14px;
      background: var(--paper-3);
      border: none;
      border-radius: 20px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-3);
      cursor: pointer;
      transition: all var(--transition);
    }

    .media-fallback-refresh:hover {
      background: var(--paper-4);
      color: var(--ink);
    }

    /* ── AUDIO PLAYER ── */
    .audio-player-wrap {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .audio-controls-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .audio-play-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all var(--transition);
    }

    .audio-play-btn:hover {
      background: var(--accent-2);
      transform: scale(1.05);
    }

    .audio-play-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .audio-track {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .audio-waveform-wrap {
      position: relative;
      cursor: pointer;
    }

    .audio-waveform {
      display: flex;
      align-items: center;
      gap: 1.5px;
      height: 36px;
    }

    .waveform-bar {
      border-radius: 2px;
      flex-shrink: 0;
      width: 3px;
      transition: background 0.05s;
    }

    .audio-seek-overlay {
      position: absolute;
      inset: 0;
      cursor: pointer;
    }

    .audio-progress-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--ink-4);
      font-variant-numeric: tabular-nums;
    }

    .audio-speed-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .audio-speed-label {
      font-size: 11px;
      color: var(--ink-4);
    }

    .audio-speed-btn {
      padding: 3px 8px;
      border-radius: 10px;
      border: 1.5px solid var(--paper-3);
      background: none;
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-4);
      cursor: pointer;
      transition: all var(--transition);
      min-height: 28px;
    }

    .audio-speed-btn.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    .audio-speed-btn:hover:not(.active) {
      background: var(--paper-3);
      color: var(--ink);
    }

    .audio-buffering-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--ink-4);
    }

    /* ── INSERT TOOLBAR ── */
    .insert-toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      background: var(--paper);
      border-top: 1px solid var(--paper-3);
      z-index: 95;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      height: var(--toolbar-h);
    }

    .insert-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--ink-4);
      margin-right: 2px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .insert-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      background: var(--paper-2);
      border: 1.5px solid var(--paper-3);
      border-radius: 20px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-3);
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      flex-shrink: 0;
      min-height: 38px;
    }

    .insert-btn:hover {
      background: var(--paper-3);
      color: var(--ink);
      border-color: var(--paper-4);
    }

    .insert-btn.image:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .insert-btn.audio:hover {
      border-color: var(--green);
      color: var(--green);
    }

    .insert-btn.drawing:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .insert-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    .size-hint-chip {
      font-size: 10px;
      color: var(--ink-4);
      background: var(--paper-2);
      border: 1px solid var(--paper-3);
      border-radius: 10px;
      padding: 3px 8px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* ── GLOBAL UPLOAD BANNER ── */
    @keyframes bannerIn {
      from {
        transform: translateY(-100%)
      }

      to {
        transform: translateY(0)
      }
    }

    .upload-banner {
      position: fixed;
      top: var(--nav-h);
      left: 0;
      right: 0;
      z-index: 88;
      background: var(--paper);
      border-bottom: 1px solid var(--paper-3);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      animation: bannerIn 0.22s ease;
    }

    .upload-banner-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse-dot 1s infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: 0.5;
        transform: scale(0.75)
      }
    }

    .upload-banner-text {
      flex: 1;
      color: var(--ink-2);
      font-weight: 500;
    }

    .upload-banner-mini-bar {
      width: 80px;
      height: 3px;
      background: var(--paper-3);
      border-radius: 2px;
      overflow: hidden;
    }

    .upload-banner-mini-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.15s linear;
    }

    /* ── DRAG-DROP OVERLAY ── */
    .dnd-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(26, 21, 16, 0.5);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      pointer-events: none;
      animation: fade-in 0.15s ease;
    }

    @keyframes fade-in {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .dnd-box {
      background: var(--paper);
      border: 2.5px dashed var(--accent);
      border-radius: 16px;
      padding: 48px 64px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      animation: pop-in 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pop-in {
      from {
        transform: scale(0.9);
        opacity: 0
      }

      to {
        transform: scale(1);
        opacity: 1
      }
    }

    .dnd-icon {
      font-size: 42px;
    }

    .dnd-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      color: var(--ink);
    }

    .dnd-sub {
      font-size: 13px;
      color: var(--ink-3);
    }

    /* ── DRAWING MODAL ── */
    .drawing-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 21, 16, 0.6);
      backdrop-filter: blur(5px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      animation: fade-in 0.15s ease;
    }

    .drawing-modal {
      background: var(--paper);
      border-radius: var(--radius);
      box-shadow: var(--shadow-xl);
      width: 100%;
      max-width: 740px;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 32px);
      overflow: hidden;
      animation: pop-in 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .drawing-modal-header {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      border-bottom: 1px solid var(--paper-3);
      gap: 10px;
      flex-shrink: 0;
    }

    .drawing-modal-title {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }

    .canvas-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      background: var(--paper-2);
      border-bottom: 1px solid var(--paper-3);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .canvas-colors {
      display: flex;
      gap: 5px;
    }

    .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: transform var(--transition);
      flex-shrink: 0;
    }

    .color-swatch:hover {
      transform: scale(1.2);
    }

    .color-swatch.active {
      border-color: var(--ink);
    }

    .canvas-sep {
      width: 1px;
      height: 24px;
      background: var(--paper-3);
      margin: 0 2px;
      flex-shrink: 0;
    }

    .canvas-sizes {
      display: flex;
      gap: 5px;
    }

    .size-btn {
      padding: 4px 10px;
      border-radius: 4px;
      border: 1.5px solid var(--paper-3);
      background: none;
      color: var(--ink-3);
      font-size: 11px;
      cursor: pointer;
      font-family: var(--font-body);
      font-weight: 600;
      transition: all var(--transition);
      min-height: 32px;
    }

    .size-btn.active,
    .size-btn:hover {
      border-color: var(--ink-3);
      color: var(--ink);
      background: var(--paper-3);
    }

    .canvas-tools {
      display: flex;
      gap: 5px;
    }

    .tool-btn {
      padding: 4px 10px;
      border-radius: 4px;
      border: 1.5px solid var(--paper-3);
      background: none;
      color: var(--ink-3);
      font-size: 11px;
      cursor: pointer;
      font-family: var(--font-body);
      font-weight: 600;
      transition: all var(--transition);
      min-height: 32px;
    }

    .tool-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    .tool-btn:hover:not(.active) {
      background: var(--paper-3);
      color: var(--ink);
    }

    .tool-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .canvas-wrap {
      flex: 1;
      overflow: hidden;
    }

    #drawing-canvas {
      display: block;
      width: 100%;
      cursor: crosshair;
      touch-action: none;
    }

    .drawing-modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 11px 16px;
      border-top: 1px solid var(--paper-3);
      flex-shrink: 0;
    }

    .drawing-footer-left {
      font-size: 12px;
      color: var(--ink-4);
    }

    .drawing-preview-pane {
      border-top: 1px solid var(--paper-3);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .drawing-preview-thumb {
      width: 72px;
      height: 48px;
      border-radius: 6px;
      border: 1.5px solid var(--paper-3);
      object-fit: cover;
    }

    .drawing-preview-info {
      flex: 1;
    }

    .drawing-preview-label {
      font-size: 11px;
      color: var(--ink-4);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 600;
    }

    .drawing-preview-size {
      font-size: 12px;
      color: var(--ink-3);
      margin-top: 2px;
    }

    /* ── RECORDING ── */
    .recording-card {
      border: 1.5px solid rgba(192, 53, 42, 0.3);
      background: var(--red-soft);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin: 8px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .rec-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rec-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse-dot 1s infinite;
      flex-shrink: 0;
    }

    .rec-label {
      font-size: 14px;
      color: var(--red);
      font-weight: 600;
      flex: 1;
    }

    .rec-timer {
      font-size: 14px;
      color: var(--red);
      font-variant-numeric: tabular-nums;
      font-weight: 700;
    }

    .rec-stop-btn {
      padding: 7px 16px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      min-height: 36px;

    //  TOAST
    // ═══════════════════════════════════════════════════════════
    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const add = useCallback((msg, type = 'default') => {
        const id = Date.now() + Math.random();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3400);
      }, []);
      return (
        <ToastContext.Provider value={add}>
          {children}
          <div className="toast-container">
            {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
          </div>
        </ToastContext.Provider>
      );
    }
    const useToast = () => useContext(ToastContext);

    // ═══════════════════════════════════════════════════════════
    //  UTILITIES
    // ═══════════════════════════════════════════════════════════
    const genId = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
    const fmtDate = ts => { if (!ts) return ''; const d = new Date(ts); return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); };
    const fmtTime = s => { const m = Math.floor(s / 60), sec = Math.floor(s % 60); return `${m}:${sec.toString().padStart(2, '0')}`; };
    const fmtBytes = b => { if (!b) return ''; if (b < 1024) return `${b}B`; if (b < 1048576) return `${(b / 1024).toFixed(0)}KB`; return `${(b / 1048576).toFixed(1)}MB`; };
    const getPreview = blocks => { for (const b of blocks) if (b.type === 'text' && b.content?.trim()) return b.content.trim().slice(0, 120); return ''; };
    const getInitials = name => { if (!name) return '?'; return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2); };
    const toYMD = d => d.toISOString().split('T')[0];
    const fmtMinutes = s => { const m = Math.round(s / 60); return m < 1 ? '<1min' : `${m}min`; };

    // ═══════════════════════════════════════════════════════════
    //  SIGNED URL CACHE
    // ═══════════════════════════════════════════════════════════
    const urlCache = new Map();
    async function freshSignedUrl(path, retries = 2) {
      if (!path) return null;
      const entry = urlCache.get(path);
      if (entry && entry.exp > Date.now() / 1000 + SIGNED_URL_GRACE) return entry.url;
      try {
        const { data, error } = await supabase.storage.from(STORAGE_BUCKET).createSignedUrl(path, SIGNED_URL_TTL);
        if (error) throw error;
        if (!data?.signedUrl) throw new Error("No signed URL returned");
        urlCache.set(path, { url: data.signedUrl, exp: Date.now() / 1000 + SIGNED_URL_TTL });
        return data.signedUrl;
      } catch (e) {
        console.error('[url]', e.message);
        if (retries > 0) { await new Promise(r => setTimeout(r, 1000)); return freshSignedUrl(path, retries - 1); }
        return null;
      }
    }
    function useSignedUrl(path) {
      const [state, setState] = useState({ url: null, loading: !!path, error: null, attempts: 0 });
      const refresh = useCallback(() => {
        if (!path) { setState({ url: null, loading: false, error: null, attempts: 0 }); return; }
        setState(s => ({ ...s, loading: true, error: null }));
        freshSignedUrl(path).then(url => {
          if (!url) setState(s => ({ ...s, loading: false, error: 'Media unavailable' }));
          else setState(s => ({ ...s, url, loading: false, error: null, attempts: s.attempts + 1 }));
        });
      }, [path]);
      useEffect(() => { refresh(); }, [refresh]);
      return { ...state, refresh };
    }

    // ═══════════════════════════════════════════════════════════
    //  DATA SERVICE
    // ═══════════════════════════════════════════════════════════
    const DS = {
      // FIXED: Real Supabase upload - no fake progress
      async uploadFile(userId, file, folder, onProgress) {
        if (file.size > MAX_FILE_BYTES) {
          throw new Error(`File is ${fmtBytes(file.size)} — limit is 5MB`);
        }
        const ext = (file.name || '').split('.').pop() || 'bin';
        const path = `${userId}/${folder}/${Date.now()}-${genId()}.${ext}`;
        onProgress && onProgress(30);
        const { data, error } = await supabase.storage
          .from(STORAGE_BUCKET)
          .upload(path, file, { upsert: false, contentType: file.type || undefined });
        if (error) throw error;
        onProgress && onProgress(100);
        return { path, size: file.size, name: file.name || 'file', createdAt: new Date().toISOString() };
      },

      // FIXED: Real base64 upload - no fake progress
      async uploadBase64(userId, dataUrl, filename, onProgress) {
        const res = await fetch(dataUrl);
        const blob = await res.blob();
        if (blob.size > MAX_FILE_BYTES) throw new Error(`Drawing is ${fmtBytes(blob.size)} — limit is 5MB`);
        const ext = blob.type.split('/')[1] || 'png';
        const path = `${userId}/drawings/${Date.now()}-${filename}.${ext}`;
        onProgress && onProgress(30);
        const { data, error } = await supabase.storage
          .from(STORAGE_BUCKET)
          .upload(path, blob, { contentType: blob.type, upsert: false });
        if (error) throw error;
        onProgress && onProgress(100);
        return { path, size: blob.size, name: `drawing.${ext}`, createdAt: new Date().toISOString() };
      },

      async createNote(uid, note) {
        let finalBlocks = note.blocks || [];
        if (note.links && note.links.length > 0) {
          finalBlocks = [...finalBlocks, { id: genId(), type: 'system_links', data: note.links }];
        }
        const { data, error } = await supabase.from('notes')
          .insert({ user_id: uid, title: note.title || '', blocks: finalBlocks, pinned: note.pinned || false })
          .select().single();
        if (error) throw error;
        return DS._norm(data);
      },
      async updateNote(uid, id, upd) {
        const p = {};
        if ('title' in upd) p.title = upd.title;
        if ('pinned' in upd) p.pinned = upd.pinned;
        if ('blocks' in upd || 'links' in upd) {
          let finalBlocks = upd.blocks || [];
          if ('links' in upd && upd.links.length > 0) {
            finalBlocks = [...finalBlocks, { id: genId(), type: 'system_links', data: upd.links }];
          }
          p.blocks = finalBlocks;
        }
        p.updated_at = new Date().toISOString();
        const { error } = await supabase.from('notes').update(p).eq('id', id).eq('user_id', uid);
        if (error) throw error;
      },
      async deleteNote(uid, id) {
        const { error } = await supabase.from('notes').delete().eq('id', id).eq('user_id', uid);
        if (error) throw error;
      },
      subscribeNotes(uid, cb) {
        supabase.from('notes').select('*').eq('user_id', uid).order('updated_at', { ascending: false })
          .then(({ data, error }) => { if (!error && data) cb(data.map(DS._norm)); });
        const ch = supabase.channel('nc-' + uid)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'notes', filter: `user_id=eq.${uid}` }, () => {
            supabase.from('notes').select('*').eq('user_id', uid).order('updated_at', { ascending: false })
              .then(({ data, error }) => { if (!error && data) cb(data.map(DS._norm)); });
          }).subscribe();
        return () => supabase.removeChannel(ch);
      },
      async logActivity(uid, dur) {
        try {
          const today = toYMD(new Date());
          const { data, error } = await supabase.from('activity_logs').select('id,duration').eq('user_id', uid).eq('date', today).maybeSingle();
          if (error) throw error;
          if (data) await supabase.from('activity_logs').update({ duration: data.duration + dur }).eq('id', data.id);
          else await supabase.from('activity_logs').insert({ user_id: uid, date: today, duration: dur });
        } catch (e) { console.error('[activity]', e.message); }
      },
      async getActivityLogs(uid) {
        try { const { data, error } = await supabase.from('activity_logs').select('*').eq('user_id', uid); if (error) throw error; return data || []; }
        catch (e) { return []; }
      },
      async signIn(email, pw) { const { data, error } = await supabase.auth.signInWithPassword({ email, password: pw }); if (error) throw error; return DS._normUser(data.user); },
      async register(email, pw, name) { const { data, error } = await supabase.auth.signUp({ email, password: pw, options: { data: { display_name: name } } }); if (error) throw error; if (!data.user) throw new Error('Check your email to confirm.'); return DS._normUser(data.user); },
      async signOut() { await supabase.auth.signOut(); },
      onAuthChange(cb) {
        supabase.auth.getSession().then(({ data }) => cb(data.session ? DS._normUser(data.session.user) : null));
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_, session) => cb(session ? DS._normUser(session.user) : null));
        return () => subscription.unsubscribe();
      },
      // FIXED: Added links field to _norm (safely intercepted from blocks array to bypass DB schema restrictions)
      _norm(r) {
        let rawBlocks = r.blocks || [];
        let extractedLinks = r.links || [];
        const sysLinkBlock = rawBlocks.find(b => b.type === 'system_links');
        if (sysLinkBlock) {
          extractedLinks = sysLinkBlock.data || [];
          rawBlocks = rawBlocks.filter(b => b.type !== 'system_links');
        }
        return { id: r.id, title: r.title || '', blocks: rawBlocks, pinned: r.pinned || false, links: extractedLinks, createdAt: r.created_at || r.createdAt, updatedAt: r.updated_at || r.updatedAt, user_id: r.user_id };
      },
      _normUser(u) { return { uid: u.id, email: u.email, displayName: u.user_metadata?.display_name || u.email?.split('@')[0] || 'User' }; },
    };

    // ═══════════════════════════════════════════════════════════
    //  AUTH PAGE
    // ═══════════════════════════════════════════════════════════
    function AuthPage() {
      const [tab, setTab] = useState('login');
      const [err, setErr] = useState('');
      const [loading, setLoading] = useState(false);
      const toast = useToast();
      const { setUser } = useContext(AppContext);
      const [le, setLe] = useState(''); const [lp, setLp] = useState('');
      const [rn, setRn] = useState(''); const [re, setRe] = useState(''); const [rp, setRp] = useState(''); const [rc, setRc] = useState('');
      async function login(e) {
        e.preventDefault(); setErr('');
        if (!le || !lp) { setErr('Fill all fields.'); return; }
        setLoading(true);
        try { setUser(await DS.signIn(le, lp)); toast('Welcome back!', 'success'); }
        catch (e) { setErr(e.message || 'Login failed.'); } finally { setLoading(false); }
      }
      async function register(e) {
        e.preventDefault(); setErr('');
        if (!rn || !re || !rp || !rc) { setErr('Fill all fields.'); return; }
        if (rp !== rc) { setErr('Passwords do not match.'); return; }
        if (rp.length < 6) { setErr('Password must be ≥6 chars.'); return; }
        setLoading(true);
        try { setUser(await DS.register(re, rp, rn)); toast('Account created!', 'success'); }
        catch (e) { setErr(e.message || 'Registration failed.'); } finally { setLoading(false); }
      }
      return (
        <div className="auth-page">
          <div className="auth-brand"><div className="brand-lines" /><div className="brand-logo">Ink<span>well</span></div><div className="brand-tagline">Your thoughts, beautifully kept</div></div>
          <div className="auth-panel">
            <div className="auth-box">
              <div className="auth-tabs">
                <button className={`auth-tab ${tab === 'login' ? 'active' : ''}`} onClick={() => { setTab('login'); setErr(''); }}>Sign In</button>
                <button className={`auth-tab ${tab === 'register' ? 'active' : ''}`} onClick={() => { setTab('register'); setErr(''); }}>Register</button>
              </div>
              {tab === 'login' ? (
                <>
                  <div className="auth-title">Welcome back</div>
                  <div className="auth-subtitle">Sign in to continue to your journal</div>
                  {err && <div className="error-msg">{err}</div>}
                  <form onSubmit={login}>
                    <div className="field"><label>Email</label><input type="email" placeholder="you@example.com" value={le} onChange={e => setLe(e.target.value)} autoComplete="email" /></div>
                    <div className="field"><label>Password</label><input type="password" placeholder="Your password" value={lp} onChange={e => setLp(e.target.value)} autoComplete="current-password" /></div>
                    <button type="submit" className="btn btn-primary" style={{ width: '100%', marginTop: 8 }} disabled={loading}>{loading ? 'Signing in…' : 'Sign In'}</button>
                  </form>
                </>
              ) : (
                <>
                  <div className="auth-title">Create account</div>
                  <div className="auth-subtitle">Start your journaling journey today</div>
                  {err && <div className="error-msg">{err}</div>}
                  <form onSubmit={register}>
                    <div className="field"><label>Full Name</label><input type="text" placeholder="Jane Doe" value={rn} onChange={e => setRn(e.target.value)} autoComplete="name" /></div>
                    <div className="field"><label>Email</label><input type="email" placeholder="you@example.com" value={re} onChange={e => setRe(e.target.value)} autoComplete="email" /></div>
                    <div className="field"><label>Password</label><input type="password" placeholder="At least 6 characters" value={rp} onChange={e => setRp(e.target.value)} autoComplete="new-password" /></div>
                    <div className="field"><label>Confirm Password</label><input type="password" placeholder="Repeat password" value={rc} onChange={e => setRc(e.target.value)} autoComplete="new-password" /></div>
                    <button type="submit" className="btn btn-primary" style={{ width: '100%', marginTop: 8 }} disabled={loading}>{loading ? 'Creating…' : 'Create Account'}</button>
                  </form>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  IMAGE BLOCK
    // ═══════════════════════════════════════════════════════════
    function ImageBlock({ block, onChange, onRetry, onDelete }) {
      const { url, loading, error, refresh } = useSignedUrl(block.path);
      const [imgError, setImgError] = useState(false);
      if (block._uploading) return <div className="media-block"><UploadingCard block={block} icon="🖼️" color="var(--blue)" /></div>;
      if (block._error) return <div className="media-block"><ErrorCard block={block} onRetry={onRetry} onDelete={onDelete} /></div>;
      return (
        <div className="media-block">
          <div className="media-card">
            {loading && <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '16px', color: 'var(--ink-4)', fontSize: 13 }}><div className="spinner spinner-sm" /> Loading image…</div>}
            {(error || imgError) && !loading && (
              <div className="media-fallback">
                <div className="media-fallback-icon">🖼️</div>
                <div className="media-fallback-msg">Image failed to load.<br />It may have expired.</div>
                <button className="media-fallback-refresh" onClick={() => { setImgError(false); refresh(); }}><I n="refresh" s={11} /> Reload</button>
              </div>

    // ═══════════════════════════════════════════════════════════
    //  AUDIO BLOCK
    // ═══════════════════════════════════════════════════════════
    const WAVEFORM_BARS = 52;
    function generateWaveform(seed) {
      const bars = []; let s = seed || 42;
      for (let i = 0; i < WAVEFORM_BARS; i++) { s = (s * 1664525 + 1013904223) & 0xffffffff; bars.push(0.2 + (Math.abs(s) % 100) / 100 * 0.8); }
      return bars;
    }
    function AudioBlock({ block, onRetry, onDelete }) {
      const { url, loading, error, refresh } = useSignedUrl(block.path);
      const [playing, setPlaying] = useState(false);
      const [currentT, setCurrentT] = useState(0);
      const [duration, setDuration] = useState(block.duration || 0);
      const [buffering, setBuffering] = useState(false);
      const [speed, setSpeed] = useState(1);
      const audioRef = useRef(null);
      const waveform = useMemo(() => generateWaveform(block.id?.charCodeAt(0) || 42), [block.id]);
      useEffect(() => {
        if (!url) return;
        const a = new Audio(url);
        audioRef.current = a;
        a.onloadedmetadata = () => { if (isFinite(a.duration)) setDuration(a.duration); };
        a.ontimeupdate = () => setCurrentT(a.currentTime);
        a.onwaiting = () => setBuffering(true);
        a.oncanplay = () => setBuffering(false);
        a.onended = () => { setPlaying(false); setCurrentT(0); };
        return () => { a.pause(); a.src = ''; };
      }, [url]);
      useEffect(() => { if (audioRef.current) audioRef.current.playbackRate = speed; }, [speed]);
      function togglePlay() {
        const a = audioRef.current; if (!a) return;
        if (playing) { a.pause(); setPlaying(false); } else { a.play(); setPlaying(true); }
      }
      function handleSeek(e) {
        const a = audioRef.current; if (!a || !duration) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        a.currentTime = pct * duration; setCurrentT(pct * duration);
      }
      const progress = duration > 0 ? currentT / duration : 0;
      if (block._uploading) return <div className="media-block"><UploadingCard block={block} icon="🎙️" color="var(--green)" /></div>;
      if (block._error) return <div className="media-block"><ErrorCard block={block} onRetry={onRetry} onDelete={onDelete} /></div>;
      return (
        <div className="media-block">
          <div className="media-card">
            {loading && <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '16px', color: 'var(--ink-4)', fontSize: 13 }}><div className="spinner spinner-sm" /> Loading audio…</div>}
            {error && !loading && (<div className="media-fallback"><div className="media-fallback-icon">🎵</div><div className="media-fallback-msg">Audio failed to load.</div><button className="media-fallback-refresh" onClick={refresh}><I n="refresh" s={11} /> Reload</button></div>)}
            {url && !loading && !error && (
              <div className="audio-player-wrap">
                <div className="audio-controls-row">
                  <button className="audio-play-btn" onClick={togglePlay} disabled={buffering} title={playing ? 'Pause' : 'Play'}>
                    {buffering ? <div className="spinner spinner-sm" style={{ borderTopColor: '#fff', borderColor: 'rgba(255,255,255,0.3)' }} /> : <I n={playing ? 'pause' : 'play'} s={14} />}
                  </button>
                  <div className="audio-track">
                    <div className="audio-waveform-wrap" onClick={handleSeek}>
                      <div className="audio-waveform">
                        {waveform.map((h, i) => {
                          const played = i / WAVEFORM_BARS < progress;
                          return <div key={i} className="waveform-bar" style={{ height: `${h * 100}%`, background: played ? (playing ? 'var(--accent)' : 'var(--green)') : 'var(--paper-4)' }} />;
                        })}
                      </div>
                      <div className="audio-seek-overlay" />
                    </div>
                    <div className="audio-progress-row">
                      <span>{fmtTime(currentT)}</span>
                      {buffering && <span className="audio-buffering-row"><div className="spinner spinner-xs" />Buffering</span>}
                      <span>{fmtTime(duration)}</span>
                    </div>
                  </div>
                </div>
                <div className="audio-speed-row">
                  <span className="audio-speed-label">Speed:</span>
                  {[0.5, 0.75, 1, 1.25, 1.5, 2].map(s => (
                    <button key={s} className={`audio-speed-btn ${speed === s ? 'active' : ''}`} onClick={() => setSpeed(s)}>{s}×</button>
                  ))}
                </div>
              </div>
            )}
            <div className="media-footer">
              <div className="media-footer-meta">
                {block._fileName && <span>{block._fileName}</span>}
                {block._fileSize && <span>{fmtBytes(block._fileSize)}</span>}
                {duration > 0 && <span>{fmtTime(duration)}</span>}
              </div>
              <div className={`media-footer-status ${block.path ? 'status-saved' : 'status-unsaved'}`}>
                {block.path ? <><I n="check" s={11} />Saved</> : 'Not saved'}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    function ChecklistBlock({ block, onChange }) {
      const items = block.items || [];
      const checked = items.filter(i => i.checked).length;
      const pct = items.length > 0 ? (checked / items.length) * 100 : 0;

      function toggleItem(id) {
        onChange({ ...block, items: items.map(i => i.id === id ? { ...i, checked: !i.checked } : i) });
      }
      function updateText(id, text) {
        onChange({ ...block, items: items.map(i => i.id === id ? { ...i, text } : i) });
      }
      function addItem() {
        onChange({ ...block, items: [...items, { id: genId(), text: '', checked: false }] });
      }
      function deleteItem(id) {
        onChange({ ...block, items: items.filter(i => i.id !== id) });
      }
      function handleKeyDown(e, id, idx) {
        if (e.key === 'Enter') { e.preventDefault(); addItem(); }
        if (e.key === 'Backspace' && items[idx].text === '' && items.length > 1) {
          e.preventDefault(); deleteItem(id);
        }
      }

      return (
        <div className="checklist-block">
          <div className="checklist-items">
            {items.map((item, idx) => (
              <div key={item.id} className="checklist-item">
                <button
                  className={`checklist-checkbox ${item.checked ? 'checked' : ''}`}
                  onClick={() => toggleItem(item.id)}
                >
                  {item.checked && <I n="check" s={10} style={{ color: '#fff' }} />}
                </button>
                <textarea
                  className={`checklist-item-text ${item.checked ? 'done' : ''}`}
                  value={item.text}
                  placeholder="List item…"
                  rows={1}
                  onChange={e => updateText(item.id, e.target.value)}
                  onKeyDown={e => handleKeyDown(e, item.id, idx)}
                  onInput={e => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }}
                />
                <button className="checklist-del-btn" onClick={() => deleteItem(item.id)}><I n="close" s={10} /></button>
              </div>
            ))}
          </div>
          {items.length > 0 && (
            <div className="checklist-progress">

    // ═══════════════════════════════════════════════════════════
    //  NEW: GRAMMAR / AI PANEL
    // ═══════════════════════════════════════════════════════════
    function GrammarPanel({ blocks, onApply, onClose }) {
      const [mode, setMode] = useState('grammar'); // 'grammar' | 'improve' | 'simplify' | 'formal'
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState('');
      const toast = useToast();

      // Gather all text from blocks
      const fullText = blocks.filter(b => b.type === 'text' && b.content?.trim()).map(b => b.content.trim()).join('\n\n');

      const modeConfig = {
        grammar: { label: 'Grammar Check' },
        improve: { label: 'Clean Text' },
        simplify: { label: 'Simplify Words' },
        formal: { label: 'Formal Tone (basic)' }
      };


      async function runCheck() {

        if (!navigator.onLine) {
          toast('No internet connection', 'error');
          return;
        }

        if (!fullText.trim()) {
          toast('No text to check', 'error');
          return;
        }

        setLoading(true);
        setResult(null);
        setError('');

        try {
          const response = await fetch("https://api.languagetool.org/v2/check", {
            method: "POST",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded"
            },
            body: new URLSearchParams({
              text: fullText,
              language: "en-US"
            })
          });
          const data = await response.json();

          let corrected = fullText;
          let improvements = "";

          // ── Grammar feedback
          if (data.matches && data.matches.length > 0) {
            improvements = data.matches.map(m =>
              `• ${m.message} → ${m.replacements[0]?.value || "no suggestion"}`
            ).join("\n");
          }
          else {
            improvements = "No major issues found 🎉";
          }

          // ── Mode transformations
          if (mode === 'simplify') {
            corrected = corrected
              .replace(/\butilize\b/gi, 'use')
              .replace(/\bapproximately\b/gi, 'about')
              .replace(/\bin order to\b/gi, 'to');

            improvements += "\n\n• Simplified wording for readability";
          }

          if (mode === 'formal') {
            corrected = corrected
              .replace(/\bcan't\b/gi, 'cannot')
              .replace(/\bwanna\b/gi, 'want to')
              .replace(/\bgonna\b/gi, 'going to');

            improvements += "\n\n• Adjusted tone to be more formal";
          }

          if (mode === 'improve') {
            corrected = corrected
              .replace(/\bi think\b/gi, '')
              .replace(/\bvery\b/gi, '')
              .replace(/\breally\b/gi, '');

            improvements += "\n\n• Improved clarity and conciseness";
          }

          setResult({
            corrected,
            improvements
          });

        }
        catch (e) {
          setError('AI check failed. Please try again.');
          console.error('[grammar]', e);
        }
        finally {
          setLoading(false);
        }
      }



      function applyResult() {
        if (!result?.corrected) return;
        onApply(result.corrected);
        toast('Text updated', 'success');
        onClose();
      }

      return (
        <div className="grammar-panel">
          <div className="grammar-panel-header">
            <div className="grammar-panel-title"><I n="sparkle" s={13} /> AI Writing Assistant</div>
            <button className="btn-icon" style={{ minWidth: 32, minHeight: 32, padding: 6 }} onClick={onClose}><I n="close" s={13} /></button>
          </div>
          <div className="rewrite-mode-row">
            {Object.entries(modeConfig).map(([key, cfg]) => (
              <button key={key} className={`rewrite-mode-btn ${mode === key ? 'active' : ''}`} onClick={() => { setMode(key); setResult(null); setError(''); }}>
                {cfg.label}
              </button>
            ))}
          </div>
          {error && <div className="error-msg" style={{ margin: 0 }}>{error}</div>}
          {result && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              <div className="grammar-results">{result.corrected}</div>
              {result.improvements && (
                <div className="grammar-improvements">
                  <strong>Changes made</strong>
                  {result.improvements}
                </div>
              )}
            </div>
          )}
          <div className="grammar-actions">
            <button className="btn btn-primary" style={{ width: 'auto', marginTop: 0, padding: '8px 16px', fontSize: 13, minHeight: 36 }} onClick={runCheck} disabled={loading}>
              {loading ? <><div className="spinner spinner-xs" style={{ borderTopColor: '#fff', borderColor: 'rgba(255,255,255,0.3)' }} /> Checking…</> : <><I n="sparkle" s={13} /> {modeConfig[mode].label}</>}
            </button>
            {result && <button className="grammar-apply-btn" onClick={applyResult}><I n="check" s={12} /> Apply to note</button>}
            {result && <button className="grammar-discard-btn" onClick={() => setResult(null)}>Discard</button>}
          </div>
        </div>
      );
    }
